<script>
    // ======================== COMMISSION MATRIX ========================
    function initializeCommissionMatrix() {
        return {
            "BASIC CARWASH_Small": [52, 65, 70], "BASIC CARWASH_Medium": [62, 72, 80],
            "BASIC CARWASH_Large": [70, 83, 95], "BASIC CARWASH_XL": [85, 100, 115],
            "BASIC CARWASH_2XL": [100, 117, 132], "BASIC CARWASH_3XL": [115, 135, 152],
            "ARMOR CARWASH_Small": [83, 95, 110], "ARMOR CARWASH_Medium": [92, 108, 125],
            "ARMOR CARWASH_Large": [100, 117, 135], "ARMOR CARWASH_XL": [115, 140, 158],
            "ARMOR CARWASH_2XL": [128, 150, 170], "ARMOR CARWASH_3XL": [144, 168, 192],
            "WAX CARWASH_Small": [150, 180, 200], "WAX CARWASH_Medium": [168, 200, 220],
            "WAX CARWASH_Large": [185, 215, 240], "WAX CARWASH_XL": [198, 230, 265],
            "WAX CARWASH_2XL": [215, 250, 285], "WAX CARWASH_3XL": [230, 265, 310],
            "WAX ARMOR CARWASH_Small": [185, 215, 245], "WAX ARMOR CARWASH_Medium": [200, 230, 270],
            "WAX ARMOR CARWASH_Large": [215, 250, 285], "WAX ARMOR CARWASH_XL": [230, 267, 305],
            "WAX ARMOR CARWASH_2XL": [245, 285, 325], "WAX ARMOR CARWASH_3XL": [260, 300, 340],
            "BUFFING CARWASH_Small": [280, 330, 370], "BUFFING CARWASH_Medium": [290, 340, 390],
            "BUFFING CARWASH_Large": [340, 400, 450], "BUFFING CARWASH_XL": [370, 430, 490],
            "BUFFING CARWASH_2XL": [410, 475, 550], "BACK TO 0 CARWASH_Small": [205, 240, 275],
            "BACK TO 0 CARWASH_Medium": [210, 245, 280], "BACK TO 0 CARWASH_Large": [220, 260, 295],
            "BACK TO 0 CARWASH_XL": [235, 280, 315], "BACK TO 0 CARWASH_2XL": [250, 295, 335],
            "BACK TO 0 CARWASH_3XL": [265, 308, 355], "PLATINUM CARWASH_Small": [300, 350, 400],
            "PLATINUM CARWASH_Medium": [330, 385, 440], "PLATINUM CARWASH_Large": [360, 420, 480],
            "PLATINUM CARWASH_XL": [390, 455, 520], "PLATINUM CARWASH_2XL": [420, 490, 560],
            "PLATINUM CARWASH_3XL": [450, 525, 600], "DIAMOND CARWASH_Small": [690, 805, 920],
            "DIAMOND CARWASH_Medium": [720, 840, 960], "DIAMOND CARWASH_Large": [780, 910, 1040],
            "DIAMOND CARWASH_XL": [810, 945, 1080], "DIAMOND CARWASH_2XL": [840, 980, 1120],
            "DIAMOND CARWASH_3XL": [870, 1015, 1160], "ACID RAIN CARWASH_Small": [300, 350, 400],
            "ACID RAIN CARWASH_Medium": [360, 420, 480], "ACID RAIN CARWASH_Large": [390, 455, 520],
            "ACID RAIN CARWASH_XL": [420, 490, 560], "ACID RAIN CARWASH_2XL": [450, 525, 600],
            "ACID RAIN CARWASH_3XL": [480, 560, 640]
        };
    }

    const defaultCustomerPrices = {
        "BASIC CARWASH": { Small: 200, Medium: 230, Large: 250, XL: 300, "2XL": 350, "3XL": 400 },
        "ARMOR CARWASH": { Small: 300, Medium: 330, Large: 350, XL: 420, "2XL": 450, "3XL": 480 },
        "WAX CARWASH": { Small: 550, Medium: 600, Large: 650, XL: 700, "2XL": 750, "3XL": 800 },
        "WAX ARMOR CARWASH": { Small: 650, Medium: 700, Large: 750, XL: 800, "2XL": 850, "3XL": 900 },
        "BUFFING CARWASH": { Small: 1000, Medium: 1050, Large: 1200, XL: 1300, "2XL": 1400 },
        "BACK TO 0 CARWASH": { Small: 680, Medium: 700, Large: 735, XL: 785, "2XL": 835, "3XL": 885 },
        "PLATINUM CARWASH": { Small: 1000, Medium: 1100, Large: 1200, XL: 1300, "2XL": 1400, "3XL": 1500 },
        "DIAMOND CARWASH": { Small: 2300, Medium: 2400, Large: 2600, XL: 2700, "2XL": 2800, "3XL": 2900 },
        "ACID RAIN CARWASH": { Small: 1000, Medium: 1200, Large: 1300, XL: 1400, "2XL": 1500, "3XL": 1600 },
        "INTERIOR DETAILING": { Standard: 4500 }, "EXTERIOR DETAILING": { Standard: 4500 },
        "TINT INSTALLATION": { Standard: 3800 }, "CERAMIC COATING": { Standard: 8000 },
        "GRAPHENE COATING": { Standard: 10000 }, "MOTOR WASH": { Small: 120, Large: 170 }
    };

    let appData = {
        services: Object.entries(defaultCustomerPrices).map(([name, prices], idx) => ({
            id: idx + 1, name: name, desc: getDescription(name), sizes: Object.keys(prices), prices: prices, category: getCategory(name), isActive: true
        })),
        categories: ['Basic Wash', 'Premium Wash', 'Wax Services', 'Buffing', 'Restoration', 'Platinum', 'Diamond', 'Acid Rain', 'Specialty'],
        customers: [],
        transactions: [],
        openServices: [],
        staff: [],
        expenses: [],
        credits: [],
        inventory: [
            { id: 1, name: "Car Shampoo", category: "Supplies", quantity: 50, unit: "Liters", reorderLevel: 20 },
            { id: 2, name: "Microfiber Towels", category: "Equipment", quantity: 200, unit: "Pieces", reorderLevel: 50 },
            { id: 3, name: "Tire Black", category: "Supplies", quantity: 30, unit: "Liters", reorderLevel: 10 },
            { id: 4, name: "Wax Polish", category: "Supplies", quantity: 15, unit: "Bottles", reorderLevel: 5 },
            { id: 5, name: "Interior Cleaner", category: "Supplies", quantity: 25, unit: "Liters", reorderLevel: 8 }
        ],
        systemSettings: {
            companyName: "8068 CAR SQUARE",
            tagline: "One Stop Shop",
            address: "8068 Carsquare, Dr Arcadio Santos Ave, Parañaque, 1720 Metro Manila",
            phone: "+63 947 702 2630 | +63 961 519 5229",
            facebook: "8068 Carsquare PH",
            taxRate: 0,
            loyaltyPointsPerPeso: 0.01,
            receiptFooter: "Drive Clean. Drive Premium.",
            commissionSplitRule: "50/50 Equal Split",
            currencySymbol: "₱",
            timezone: "Asia/Manila",
            businessHours: "Mon-Sat 8:00 AM - 7:00 PM",
            companyLogo: null,
            defaultPaymentMethods: ['Cash', 'GCash', 'Maya', 'Credit Card', 'Bank Transfer', 'Credit (Utang)'],
            receiptSize: '58mm',
            receiptHeader: 'OFFICIAL RECEIPT',
            showVAT: false
        },
        users: [
            { id: 1, username: "owner", password: "owner123", role: "Owner", name: "Owner", isActive: true },
            { id: 2, username: "manager", password: "manager123", role: "Manager", name: "Manager", isActive: true },
            { id: 3, username: "cashier", password: "cashier123", role: "Cashier", name: "Cashier", isActive: true },
            { id: 4, username: "staff", password: "staff123", role: "Staff", name: "Staff", isActive: true }
        ],
        currentUser: null,
        nextIds: { transaction: 100, customer: 50, expense: 20, service: 50, openService: 1, credit: 1 },
        commissionMatrix: initializeCommissionMatrix()
    };

    function getDescription(name) {
        const desc = {
            "BASIC CARWASH": "Carwash + Vacuum + Tire Black",
            "ARMOR CARWASH": "Carwash + Vacuum + Interior Dressing + Tire Black",
            "WAX CARWASH": "Carwash + Vacuum + Hydrophobic Wax + Tire Black",
            "WAX ARMOR CARWASH": "Carwash + Vacuum + Interior Dressing + Hydrophobic Wax + Tire Black",
            "BUFFING CARWASH": "Carwash + Vacuum + Interior Dressing + Hydrophobic Wax + Buffing Wax + Tire Black",
            "BACK TO 0 CARWASH": "Complete restoration + Paint correction",
            "PLATINUM CARWASH": "Carwash + Vacuum + Interior Dressing + Ceramic Wax + Tire Black",
            "DIAMOND CARWASH": "Carwash + Vacuum + Interior Dressing + Buffing Wax + Ceramic Wax + Tire Black",
            "ACID RAIN CARWASH": "Acid rain removal + Paint decontamination"
        };
        return desc[name] || "Premium automotive service";
    }

    function getCategory(name) {
        if(name.includes("BASIC")) return "Basic Wash";
        if(name.includes("ARMOR") && !name.includes("WAX")) return "Premium Wash";
        if(name.includes("WAX ARMOR")) return "Premium Wax";
        if(name.includes("WAX")) return "Wax Services";
        if(name.includes("BUFFING")) return "Buffing";
        if(name.includes("BACK")) return "Restoration";
        if(name.includes("PLATINUM")) return "Platinum";
        if(name.includes("DIAMOND")) return "Diamond";
        if(name.includes("ACID")) return "Acid Rain";
        return "Specialty";
    }

    const saved = localStorage.getItem("8068_enterprise_v8");
    if(saved) {
        try {
            const parsed = JSON.parse(saved);
            appData = { ...appData, ...parsed };
            if (!appData.commissionMatrix || Object.keys(appData.commissionMatrix).length === 0) {
                appData.commissionMatrix = initializeCommissionMatrix();
            }

    // ======================== RECALCULATE STAFF COMMISSIONS ========================
    function recalculateStaffCommissions() {
        appData.staff.forEach(s => {
            s.totalCommission = 0;
            s.jobsCompleted = 0;
            s.salesGenerated = 0;
            s.weeklyBreakdown = { Sunday: 0, Monday: 0, Tuesday: 0, Wednesday: 0, Thursday: 0, Friday: 0, Saturday: 0 };
            s.weekPart1Total = 0;
            s.weekPart2Total = 0;
            s.monthlyCommission = 0;
            s.dailyCommission = 0;
        });

        appData.transactions.forEach(t => {
            if (t.staffCommissions) {
                const txDate = new Date(t.date);
                const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][txDate.getDay()];
                const monthKey = `${txDate.getFullYear()}-${String(txDate.getMonth()+1).padStart(2,'0')}`;
                const dayKey = txDate.toISOString().slice(0,10);
                Object.entries(t.staffCommissions).forEach(([staffId, data]) => {
                    const staff = appData.staff.find(s => s.id === parseInt(staffId));
                    if (staff) {
                        const commission = data.commission || 0;
                        staff.totalCommission = (staff.totalCommission || 0) + commission;
                        staff.jobsCompleted = (staff.jobsCompleted || 0) + (data.jobs || 1);
                        staff.salesGenerated = (staff.salesGenerated || 0) + (t.total || 0);
                        if (staff.weeklyBreakdown) {
                            staff.weeklyBreakdown[dayName] = (staff.weeklyBreakdown[dayName] || 0) + commission;
                        }
                        staff.monthlyCommission = (staff.monthlyCommission || 0) + commission;
                        staff.dailyCommission = (staff.dailyCommission || 0) + commission;
                    }
                });
            }
        });

        appData.staff.forEach(s => {
            if (s.weeklyBreakdown) {
                s.weekPart1Total = (s.weeklyBreakdown.Sunday || 0) + (s.weeklyBreakdown.Monday || 0) + (s.weeklyBreakdown.Tuesday || 0);
                s.weekPart2Total = (s.weeklyBreakdown.Wednesday || 0) + (s.weeklyBreakdown.Thursday || 0) + (s.weeklyBreakdown.Friday || 0) + (s.weeklyBreakdown.Saturday || 0);
            }
        });

        saveToLocal();
    }

    // ======================== EXPORT FUNCTIONS ========================
    function getFilteredTransactions(period) {
        const now = new Date();
        let filtered = [];
        if (period === 'daily') {
            const todayStr = now.toISOString().slice(0,10);
            filtered = appData.transactions.filter(t => t.date.startsWith(todayStr));
        } else if (period === 'weekly') {
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            const weekStartStr = weekStart.toISOString().slice(0,10);
            filtered = appData.transactions.filter(t => t.date >= weekStartStr);
        } else if (period === 'monthly') {
            const month = now.getMonth();
            const year = now.getFullYear();
            filtered = appData.transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === month && d.getFullYear() === year;
            });
        } else if (period === 'yearly') {
            const year = now.getFullYear();
            filtered = appData.transactions.filter(t => new Date(t.date).getFullYear() === year);
        }
        return filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function getFilteredOpenServices(status) {

        return appData.openServices.filter(s => s.status === status);

    function generateExcel(data, columns, title, filename) {
        const wb = XLSX.utils.book_new();
        const wsData = [columns.map(c => c.header)];
        data.forEach(row => {
            wsData.push(columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
        });
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!cols'] = columns.map(() => ({ wch: 20 }));
        ws['!rows'] = [{ hpx: 30 }];
        XLSX.utils.book_append_sheet(wb, ws, title);
        XLSX.writeFile(wb, `${filename}_${new Date().toISOString().slice(0,10)}.xlsx`);
        return true;
    }

    function generateCSV(data, columns, filename) {
        let csv = columns.map(c => c.header).join(',') + '\n';
        data.forEach(row => {
            csv += columns.map(c => `"${row[c.key] !== undefined ? row[c.key] : ''}"`).join(',') + '\n';
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${filename}_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        return true;
    }

    function generatePDF(data, columns, title, filename, logo) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        
        if (logo) {
            try {
                doc.addImage(logo, 'JPEG', pageWidth/2 - 20, 5, 40, 20);
            } catch(e) {}
        }
        
        doc.setFontSize(16);
        doc.text(title, pageWidth/2, 30, { align: 'center' });
        doc.setFontSize(10);
        doc.text(`Generated: ${new Date().toLocaleString()}`, pageWidth/2, 38, { align: 'center' });
        doc.text(`Company: ${appData.systemSettings.companyName}`, pageWidth/2, 44, { align: 'center' });
        
        const tableData = data.map(row => columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
        doc.autoTable({
            head: [columns.map(c => c.header)],
            body: tableData,
            startY: 50,
            styles: { fontSize: 8, cellPadding: 2 },
            headStyles: { fillColor: [0, 212, 255], textColor: [0,0,0], fontStyle: 'bold' },
            alternateRowStyles: { fillColor: [240, 240, 240] },
            didDrawPage: function(data) {
                doc.setFontSize(8);
                doc.text(`Page ${data.pageNumber}`, pageWidth - 20, doc.internal.pageSize.getHeight() - 10);
            }
        });
        doc.save(`${filename}_${new Date().toISOString().slice(0,10)}.pdf`);
        return true;
    }

    // ======================== WEEKLY COMMISSION REPORT ========================
    function renderWeeklyCommissionReport() {
        if(showLogin) return renderLogin();
        recalculateStaffCommissions();

        const now = new Date();
        const currentWeekStart = new Date(now);
        currentWeekStart.setDate(now.getDate() - now.getDay());
        const weekStartStr = currentWeekStart.toISOString().slice(0,10);
        const weekEnd = new Date(currentWeekStart);
        weekEnd.setDate(currentWeekStart.getDate() + 6);
        const weekEndStr = weekEnd.toISOString().slice(0,10);

        const weekDates = [];
        for (let d = 0; d < 7; d++) {
            const dt = new Date(currentWeekStart);
            dt.setDate(currentWeekStart.getDate() + d);
            weekDates.push({ date: dt, dateStr: dt.toISOString().slice(0,10), dayName: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dt.getDay()] });
        }

        const weekTx = appData.transactions.filter(t => t.date >= weekStartStr && t.date <= weekEndStr);
        
        const weekStaffMap = {};
        appData.staff.forEach(s => {
            weekStaffMap[s.id] = {
                name: s.name,
                position: s.position,
                tier: s.commissionTier,
                jobs: 0,
                sales: 0,
                sunday: 0, monday: 0, tuesday: 0, wednesday: 0, thursday: 0, friday: 0, saturday: 0,
                total: 0,
                part1: 0,
                part2: 0
            };
        });

        weekTx.forEach(t => {
            if (t.staffCommissions) {
                const txDate = new Date(t.date);
                const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][txDate.getDay()];
                Object.entries(t.staffCommissions).forEach(([staffId, data]) => {
                    const staffIdNum = parseInt(staffId);
                    if (weekStaffMap[staffIdNum]) {
                        const comm = data.commission || 0;
                        weekStaffMap[staffIdNum].jobs += (data.jobs || 1);
                        weekStaffMap[staffIdNum].sales += (t.total || 0);
                        weekStaffMap[staffIdNum].total += comm;
                        weekStaffMap[staffIdNum][dayName.toLowerCase()] = (weekStaffMap[staffIdNum][dayName.toLowerCase()] || 0) + comm;
                    }
                });
            }
        });

        Object.values(weekStaffMap).forEach(s => {
            s.part1 = (s.sunday || 0) + (s.monday || 0) + (s.tuesday || 0);
            s.part2 = (s.wednesday || 0) + (s.thursday || 0) + (s.friday || 0) + (s.saturday || 0);
        });

        const dayHeaders = weekDates.map(wd => 
            `<th class="text-center py-1 text-cyan-300 text-xs">${wd.dayName.slice(0,3)}<br><span class="text-gray-500 text-[10px]">${wd.dateStr}</span></th>`
        ).join('');

        let tableRows = '';
        let grandTotal = 0;
        let grandJobs = 0;
        let grandSales = 0;
        Object.values(weekStaffMap).forEach(s => {
            grandTotal += s.total;
            grandJobs += s.jobs;
            grandSales += s.sales;
            tableRows += `<tr class="border-b border-gray-700 hover:bg-gray-800 transition">
                <td class="py-2 font-semibold">${s.name}</td>
                <td>${s.position}</td>
                <td class="text-center"><span class="commission-badge">${s.tier}%</span></td>
                <td class="text-center">${s.jobs}</td>
                <td class="text-right">₱${s.sales.toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.sunday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.monday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.tuesday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.wednesday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.thursday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.friday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.saturday||0).toFixed(2)}</td>
                <td class="text-center text-yellow-400 font-bold">₱${s.part1.toFixed(2)}</td>
                <td class="text-center text-yellow-400 font-bold">₱${s.part2.toFixed(2)}</td>
                <td class="text-center text-green-400 font-bold">₱${s.total.toFixed(2)}</td>
            </tr>`;
        });

        return `<div class="card-premium p-6">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h3 class="text-2xl font-bold"><i class="fas fa-calendar-week"></i> Weekly Commission Report</h3>
                    <p class="text-sm text-gray-400">${weekStartStr} to ${weekEndStr}</p>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="exportWeeklyCommissionExcel()" class="excel-export-btn px-4 py-2 rounded text-sm text-white"><i class="fas fa-file-excel"></i> Excel</button>
                    <button onclick="exportWeeklyCommissionPDF()" class="pdf-export-btn px-4 py-2 rounded text-sm text-white"><i class="fas fa-file-pdf"></i> PDF</button>

                </div>
            </div>
            <div class="overflow-x-auto max-h-96 overflow-y-auto">
                <table class="w-full text-sm commission-summary-table">
                    <thead class="sticky top-0 bg-gray-900 border-b-2 border-cyan-400">
                        <tr>
                            <th class="text-left">Staff</th><th class="text-left">Position</th><th class="text-center">Tier</th>
                            <th class="text-center">Jobs</th><th class="text-right">Sales</th>
                            ${dayHeaders}
                            <th class="text-center text-yellow-400">Sun-Tue</th>
                            <th class="text-center text-yellow-400">Wed-Sat</th>
                            <th class="text-center text-green-400">Grand Total</th>

                    </thead>
                    <tbody>
                        ${tableRows || '<tr><td colspan="16" class="text-center py-4 text-gray-400">No data for this week</td></tr>'}
                        <tr class="border-t-2 border-cyan-400 bg-gray-800 font-bold">
                            <td colspan="4" class="py-2 text-right">TOTALS:</td>
                            <td class="text-right">₱${grandSales.toFixed(2)}</td>
                            <td colspan="7"></td>
                            <td class="text-center text-yellow-400">₱${Object.values(weekStaffMap).reduce((s, item) => s + item.part1, 0).toFixed(2)}</td>
                            <td class="text-center text-yellow-400">₱${Object.values(weekStaffMap).reduce((s, item) => s + item.part2, 0).toFixed(2)}</td>
                            <td class="text-center text-green-400">₱${grandTotal.toFixed(2)}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>`;
    }

    function createOpenService(customer, vehicle, plate, items, staff, total, remarks) {
        const openService = {
            id: "OS-" + new Date().getFullYear() + "-" + (appData.nextIds.openService++),
            customer: customer || "Walk-in Customer",
            vehicle: vehicle || "N/A",
            plate: plate || "N/A",
            items: items.map(i => ({ ...i })),
            total: total,
            staff: staff || [],
            remarks: remarks || "",
            status: 'pending',
            createdAt: new Date().toISOString(),
            completedAt: null,
            paidAt: null,
            commissionProcessed: false
        };
        appData.openServices.push(openService);
        saveToLocal();
        return openService;
    }

    function updateOpenServiceStatus(id, status) {
        const service = appData.openServices.find(s => s.id === id);
        if(service) {
            service.status = status;
            if(status === 'completed') {
                service.completedAt = new Date().toISOString();
                processOpenServiceCommission(service);
            }
            saveToLocal();
            renderApp();
        }
    }

    function processOpenServiceCommission(service) {
        if (service.commissionProcessed) return;
        if (!service.staff || service.staff.length === 0) return;

        const staffCommissionMap = new Map();
        service.items.forEach(item => {
            if (item.assignedStaff && item.assignedStaff.length > 0) {
                item.assignedStaff.forEach(staff => {
                    const commissionAmt = getCommissionAmount(item.serviceName, item.variant, staff.commissionTier);
                    const splitCommission = item.assignedStaff.length === 2 ? commissionAmt / 2 : commissionAmt;
                    
                    const current = staffCommissionMap.get(staff.id) || { 
                        commission: 0, 
                        jobs: 0, 
                        name: staff.name, 
                        tier: staff.commissionTier,
                        serviceTotal: 0
                    };
                    current.commission += splitCommission;
                    current.jobs += 1;
                    current.serviceTotal += item.total;
                    staffCommissionMap.set(staff.id, current);
                });
            }
        });

        const transaction = {
            id: "OS-" + generateReceiptNo(),
            date: service.completedAt || new Date().toISOString(),
            customer: service.customer,
            vehicle: service.vehicle,
            plate: service.plate,
            items: service.items.map(i => ({ ...i })),
            staffCommissions: Object.fromEntries([...staffCommissionMap.entries()].map(([id, data]) => [id, { 
                commission: data.commission, 
                tier: data.tier, 
                name: data.name,
                jobs: data.jobs
            }])),
            subtotal: service.total,
            discount: 0,
            loyaltyUsed: 0,
            total: service.total,
            paymentMethod: 'Open Service',
            cashTendered: service.total,
            change: 0,
            remarks: service.remarks + ' (Completed Service)',
            isOpenService: true,
            openServiceId: service.id,
            isCommissionAutoGenerated: true
        };

        appData.transactions.unshift(transaction);

        staffCommissionMap.forEach((data, staffId) => {
            const staffMember = appData.staff.find(s => s.id === staffId);
            if(staffMember) {
                staffMember.totalCommission = (staffMember.totalCommission || 0) + data.commission;
                staffMember.jobsCompleted = (staffMember.jobsCompleted || 0) + data.jobs;
                staffMember.salesGenerated = (staffMember.salesGenerated || 0) + data.serviceTotal;
            }
        });

        service.commissionProcessed = true;
        service.transactionId = transaction.id;

        saveToLocal();
        recalculateStaffCommissions();
    }

    function completeOpenServicePayment(id, paymentMethod, cashTendered) {
        const service = appData.openServices.find(s => s.id === id);
        if(!service) return;
        
        const total = service.total;
        if(paymentMethod === "Cash" && cashTendered < total) {
            alert("Insufficient cash!");
            return;
        }
        
        if (!service.commissionProcessed && service.status === 'completed') {
            processOpenServiceCommission(service);
        }
        
        const transaction = {
            id: generateReceiptNo(),
            date: new Date().toISOString(),
            customer: service.customer,
            vehicle: service.vehicle,
            plate: service.plate,
            items: service.items.map(i => ({ ...i })),
            subtotal: total,
            discount: 0,
            loyaltyUsed: 0,
            total: total,
            paymentMethod: paymentMethod,
            cashTendered: paymentMethod === "Cash" ? cashTendered : total,
            change: paymentMethod === "Cash" ? (cashTendered - total) : 0,
            remarks: service.remarks,
            isOpenService: true,
            openServiceId: service.id
        };
        
        appData.transactions.unshift(transaction);
        service.paidAt = new Date().toISOString();
        service.status = 'paid';
        
        saveToLocal();
        recalculateStaffCommissions();
        alert(`✅ Payment Completed!\nTotal: ₱${total.toFixed(2)}`);
        printReceipt(transaction);
        
        appData.openServices = appData.openServices.filter(s => s.id !== id);
        renderApp();
    }

    function completeSaleWrapper() {

    function completeSale() {
        if(posCart.length === 0) { alert("Please add services to cart!"); return; }
        const total = calcTotal();
        
        const isCredit = selectedPayment === 'Credit (Utang)';
        if (isCredit) {
            if (!selectedCustomer) {
                alert("Please select a customer for credit transaction!");
                return;
            }
            const creditRecord = {
                id: 'CR-' + new Date().getFullYear() + '-' + (appData.nextIds.credit++),
                customerName: selectedCustomer.name,
                contact: selectedCustomer.mobile || '',
                transactionId: 'PENDING-' + Date.now(),
                amount: total,
                paid: 0,
                balance: total,
                date: new Date().toISOString().slice(0,10),
                status: 'pending'
            };
            appData.credits.push(creditRecord);
        }
        
        if(selectedPayment === "Cash" && cashTendered < total) { alert("Insufficient cash!"); return; }
        
        const staffCommissionMap = new Map();
        posCart.forEach(item => { if(item.assignedStaff) item.assignedStaff.forEach(staff => { const current = staffCommissionMap.get(staff.id) || { commission: 0, jobs: 0, name: staff.name, tier: staff.commissionTier }; current.commission += staff.splitCommission; current.jobs += 1; staffCommissionMap.set(staff.id, current); }); });
        
        const transaction = { 
            id: generateReceiptNo(), 
            date: new Date().toISOString(), 
            customer: selectedCustomer ? selectedCustomer.name : "Walk-in Customer", 
            customerId: selectedCustomer?.id, 
            vehicle: vehicleInfo.model || "N/A", 
            plate: vehicleInfo.plate || "N/A", 
            items: posCart.map(i => ({ ...i })), 
            staffCommissions: Object.fromEntries([...staffCommissionMap.entries()]), 
            subtotal: calcSubtotal(), 
            discount, 
            loyaltyUsed: loyaltyPointsUsed, 
            total, 
            paymentMethod: selectedPayment,
            isCredit: isCredit,
            cashTendered: selectedPayment === "Cash" ? cashTendered : total, 
            change: selectedPayment === "Cash" ? (cashTendered - total) : 0,
            remarks: cartRemarks + (isCredit ? ' (CREDIT - PENDING)' : ''),
            itemRemarks: posCart.map(i => ({ service: i.serviceName, remark: i.remarks || 'None' }))
        };
        
        appData.transactions.unshift(transaction);
        staffCommissionMap.forEach((data, staffId) => { const staff = appData.staff.find(s => s.id === staffId); if(staff) { staff.totalCommission = (staff.totalCommission || 0) + data.commission; staff.jobsCompleted += data.jobs; staff.salesGenerated += transaction.items.filter(i => i.assignedStaff?.some(s => s.id === staffId)).reduce((sum, i) => sum + i.total, 0); } });
        
        if(selectedCustomer && !isCredit) { let earnedPoints = Math.floor(total * appData.systemSettings.loyaltyPointsPerPeso); selectedCustomer.loyaltyPoints = (selectedCustomer.loyaltyPoints || 0) + earnedPoints; const idx = appData.customers.findIndex(c=>c.id === selectedCustomer.id); if(idx !== -1) appData.customers[idx].loyaltyPoints = selectedCustomer.loyaltyPoints; }
        
        saveToLocal();
        recalculateStaffCommissions();
        alert(`✅ SALE COMPLETED!\nTotal: ₱${total.toFixed(2)}${isCredit ? '\n⚠️ CREDIT (UTANG) - PENDING PAYMENT' : ''}`);
        printReceipt(transaction);
        posCart = []; selectedCustomer = null; vehicleInfo = { plate: "", model: "", size: "Medium" }; discount = 0; loyaltyPointsUsed = 0; cashTendered = 0; cartRemarks = "";
        renderApp();
    }

            </div></div></div>`;

    };
    window.confirmAddCommission = () => {
        const service = document.getElementById('addCommService')?.value;
        const size = document.getElementById('addCommSize')?.value;
        const val30 = parseFloat(document.getElementById('addComm30')?.value);
        const val35 = parseFloat(document.getElementById('addComm35')?.value);
        const val40 = parseFloat(document.getElementById('addComm40')?.value);
        if (!service || !size) { alert("Service and size required!"); return; }
        const key = `${service}_${size}`;
        if (!isNaN(val30) && !isNaN(val35) && !isNaN(val40)) {
            appData.commissionMatrix[key] = [val30, val35, val40];
            saveToLocal(); closeAdminModal(); renderApp();
        }
    };
    window.autoGenerateCommissions = () => {
        if(confirm("Auto-generate commissions based on service prices?")) {
            appData.services.forEach(service => {
                service.sizes.forEach(size => {
                    const price = service.prices[size];
                    if (price) {
                        const tier30 = Math.round(price * 0.26);
                        const tier35 = Math.round(price * 0.30);
                        const tier40 = Math.round(price * 0.35);
                        const key = `${service.name}_${size}`;
                        appData.commissionMatrix[key] = [tier30, tier35, tier40];
                    }
                });
            });
            saveToLocal(); renderApp(); alert("Commissions auto-generated!");
        }
    };
    window.resetCommissionMatrix = () => {
        if(confirm("Reset commission matrix to default?")) {
            appData.commissionMatrix = initializeCommissionMatrix();
            saveToLocal(); renderApp();
        }
    };

                    <div><label class="text-gray-400 text-sm">Business Hours</label><div class="editable-field bg-gray-800 p-2 rounded cursor-pointer" onclick="editSetting('businessHours')">${s.businessHours}</div></div>
                </div>
            </div>
            <div class="mt-6 grid grid-cols-2 gap-3">
                <button onclick="backupData()" class="bg-cyan-600 p-2 rounded"><i class="fas fa-download"></i> Backup Database</button>
                <button onclick="restoreData()" class="bg-gray-600 p-2 rounded"><i class="fas fa-upload"></i> Restore Backup</button>
                <button onclick="exportAllData()" class="bg-green-600 p-2 rounded"><i class="fas fa-file-export"></i> Export All Data</button>
                <button onclick="resetSystem()" class="bg-red-600 p-2 rounded"><i class="fas fa-trash"></i> Reset to Default</button>
            </div>
            <div class="mt-4 p-3 bg-gray-800 rounded-lg text-xs">
                <div class="text-gray-400">System Info</div>
                <div>Version: 8.4 Stable | Last Saved: ${localStorage.getItem('8068_system_last_saved') ? new Date(localStorage.getItem('8068_system_last_saved')).toLocaleString() : 'Never'}</div>
                <div>Records: ${appData.transactions.length} TX | ${appData.customers.length} Customers | ${appData.staff.length} Staff</div>
                <div>Credit Records: ${(appData.credits || []).length} | Outstanding: ₱${(appData.credits || []).reduce((sum, c) => sum + (c.balance || 0), 0).toFixed(2)}</div>
                <div>Commission Entries: ${Object.keys(appData.commissionMatrix || {}).length}</div>
                <div>Open Services: ${appData.openServices.filter(s=>s.status!=='completed').length}</div>
                <div class="mt-1 text-green-400">✅ All Export (Excel/PDF/CSV) & Print Functions Working</div>
                <div class="mt-1 text-cyan-400">📅 Auto-Commission on Service Complete</div>
            </div>
        </div>`;
    }

    window.updateReceiptSize = (size) => {
        appData.systemSettings.receiptSize = size;
        saveToLocal();
        renderApp();
        alert(`✅ Receipt size updated to ${size}`);
    };

    window.updateShowVAT = (checked) => {
        appData.systemSettings.showVAT = checked;
        saveToLocal();
        renderApp();
        alert(`✅ VAT display ${checked ? 'enabled' : 'disabled'}`);
    };

    window.editPaymentMethods = () => {
        const current = appData.systemSettings.defaultPaymentMethods.join(', ');
        const newMethods = prompt("Edit payment methods (comma separated):", current);
        if(newMethods) {
            appData.systemSettings.defaultPaymentMethods = newMethods.split(',').map(m => m.trim()).filter(m => m);
            saveToLocal(); renderApp();
        }
    };

    window.uploadLogo = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    appData.systemSettings.companyLogo = event.target.result;
                    saveToLocal();
                    renderApp();
                    alert('Logo uploaded successfully!');
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    };
    window.removeLogo = () => {
        if(confirm('Remove company logo?')) {
            appData.systemSettings.companyLogo = null;
            saveToLocal();
            renderApp();
            alert('Logo removed.');
        }
    };
    window.editSetting = (key) => {
        const val = prompt(`Edit ${key}:`, appData.systemSettings[key]);
        if(val !== null) { appData.systemSettings[key] = val; saveToLocal(); renderApp(); }
    };
    window.editLoyalty = () => {
        const val = parseInt(prompt("Loyalty points per ₱1000 spent:", appData.systemSettings.loyaltyPointsPerPeso * 1000));
        if(!isNaN(val)) { appData.systemSettings.loyaltyPointsPerPeso = val / 1000; saveToLocal(); renderApp(); }
    };
    window.editTax = () => {
        const val = parseFloat(prompt("Tax rate (%):", appData.systemSettings.taxRate));
        if(!isNaN(val)) { appData.systemSettings.taxRate = val; saveToLocal(); renderApp(); }
    };
    window.backupData = () => {
        const dataStr = JSON.stringify(appData);
        localStorage.setItem("system_backup_8068", dataStr);
        const blob = new Blob([dataStr], {type: "application/json"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `8068_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
        alert("Backup created!");
    };
    window.restoreData = () => {
        const backup = localStorage.getItem("system_backup_8068");
        if(backup) { try { Object.assign(appData, JSON.parse(backup)); saveToLocal(); alert("Restored!"); renderApp(); } catch(e) { alert("Backup corrupted!"); } }
        else { alert("No backup found!"); }
    };
    window.exportAllData = () => {
        const blob = new Blob([JSON.stringify(appData, null, 2)], {type: "application/json"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `8068_full_export_${new Date().toISOString().slice(0,10)}.json`; a.click();
    };
    window.resetSystem = () => {
        if(confirm("WARNING: This will erase ALL data and reset to factory defaults. Continue?")) {
            if(confirm("Are you absolutely sure? This cannot be undone!")) { location.reload(); }
        }
    };

    window.closeAdminModal = () => document.getElementById('adminModal')?.remove();
    window.navigateAdmin = (panel) => { currentAdminPanel = panel; renderApp(); };
    window.closePaymentModal = () => document.getElementById('paymentModal')?.remove();

    // ======================== MAIN RENDER ========================
    function renderApp() {
        if(showLogin) {
            document.getElementById("mainContent").innerHTML = renderLogin();
            return;
        }
        
        const main = document.getElementById("mainContent");
        if(!main) return;
        let content = "";
        if(currentView === "dashboard") content = renderDashboard();
        else if(currentView === "pos") content = renderPOS();
        else if(currentView === "openservices") content = renderOpenServices();
        else if(currentView === "customers") content = renderCustomers();
        else if(currentView === "staff") content = renderStaffDashboard();
        else if(currentView === "admin") content = renderAdminDashboard();
        else if(currentView === "reports") content = renderReportSummaries();
        main.innerHTML = content;
        setTimeout(() => {
            document.getElementById('plateInput')?.addEventListener('input', (e) => vehicleInfo.plate = e.target.value);
            document.getElementById('modelInput')?.addEventListener('input', (e) => vehicleInfo.model = e.target.value);
        }, 50);
        updateClock();
        saveToLocal();
    }

    window.navigate = (view) => { 
        currentView = view; 
        mobileNavOpen = false;
        renderApp(); 
    };

    // ======================== LIVE CLOCK ========================
    function updateClock() {
        const now = new Date();
        const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        const clockEl = document.getElementById('liveClock');
        if(clockEl) clockEl.textContent = now.toLocaleDateString('en-US', options);
    }
    setInterval(updateClock, 1000);

    // ======================== UI ========================
    function toggleMobileNav() {
        mobileNavOpen = !mobileNavOpen;
        const nav = document.getElementById('mobileNav');
        if(nav) nav.classList.toggle('open');
    }

    document.body.innerHTML = `
        <div class="max-w-screen-2xl mx-auto px-4 py-3">
            <!-- ===== COMPACT HEADER ===== -->
            <header class="main-header">
                <div class="logo-container">
                    <!-- CS Monogram Logo -->
                    <div class="logo-icon">
                        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="5" y="5" width="90" height="90" rx="15" stroke="#00d4ff" stroke-width="3" fill="#0a0a0a"/>
                            <circle cx="50" cy="50" r="35" stroke="#00d4ff" stroke-width="2" fill="none"/>
                            <text x="50" y="58" font-family="Inter, sans-serif" font-size="38" font-weight="700" fill="#00d4ff" text-anchor="middle" dominant-baseline="central">CS</text>
                            <circle cx="50" cy="50" r="42" stroke="rgba(0,212,255,0.2)" stroke-width="1" stroke-dasharray="4 4" fill="none"/>
                        </svg>
                    </div>
                    <div class="brand-text">
                        <span class="company-title">8068 CAR SQUARE</span>
                        <span class="company-subtitle">One Stop Shop <span class="company-version">| v8.4</span></span>
                    </div>
                </div>

                <!-- Desktop Navigation -->
                <div class="header-nav" id="desktopNav">
                    <button class="nav-btn ${currentView === 'dashboard' ? 'active' : ''}" onclick="navigate('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
                    <button class="nav-btn ${currentView === 'pos' ? 'active' : ''}" onclick="navigate('pos')"><i class="fas fa-cash-register"></i> POS</button>
                    <button class="nav-btn ${currentView === 'openservices' ? 'active' : ''}" onclick="navigate('openservices')"><i class="fas fa-clipboard-list"></i> Open</button>
                    <button class="nav-btn ${currentView === 'staff' ? 'active' : ''}" onclick="navigate('staff')"><i class="fas fa-id-badge"></i> Staff</button>
                    <button class="nav-btn ${currentView === 'customers' ? 'active' : ''}" onclick="navigate('customers')"><i class="fas fa-users"></i> Customers</button>
                    <button class="nav-btn ${currentView === 'admin' ? 'active' : ''}" onclick="navigate('admin')"><i class="fas fa-crown"></i> Admin</button>
                    <button class="nav-btn ${currentView === 'reports' ? 'active' : ''}" onclick="navigate('reports')"><i class="fas fa-chart-bar"></i> Reports</button>
                </div>

                <div class="header-user">
                    <span class="user-name"><i class="fas fa-user-circle"></i> ${appData.currentUser?.name || 'Guest'}</span>
                    <span class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</span>
                    <button class="mobile-nav-toggle" onclick="toggleMobileNav()"><i class="fas fa-bars"></i></button>
                </div>
            </header>

            <!-- Mobile Navigation -->
            <div class="mobile-nav" id="mobileNav">
                <button class="nav-btn ${currentView === 'dashboard' ? 'active' : ''}" onclick="navigate('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
                <button class="nav-btn ${currentView === 'pos' ? 'active' : ''}" onclick="navigate('pos')"><i class="fas fa-cash-register"></i> POS</button>
                <button class="nav-btn ${currentView === 'openservices' ? 'active' : ''}" onclick="navigate('openservices')"><i class="fas fa-clipboard-list"></i> Open Services</button>
                <button class="nav-btn ${currentView === 'staff' ? 'active' : ''}" onclick="navigate('staff')"><i class="fas fa-id-badge"></i> Staff</button>
                <button class="nav-btn ${currentView === 'customers' ? 'active' : ''}" onclick="navigate('customers')"><i class="fas fa-users"></i> Customers</button>
                <button class="nav-btn ${currentView === 'admin' ? 'active' : ''}" onclick="navigate('admin')"><i class="fas fa-crown"></i> Admin</button>
                <button class="nav-btn ${currentView === 'reports' ? 'active' : ''}" onclick="navigate('reports')"><i class="fas fa-chart-bar"></i> Reports</button>
            </div>

            <!-- Main Content -->
            <div id="mainContent" class="mt-2"></div>

            <footer class="text-center text-gray-500 text-sm mt-8 pt-4 border-t border-gray-800">${appData.systemSettings.companyName} | v8.4 Stable | All Export & Print Functions Working</footer>
        </div>
    `;
    renderApp();
    saveToLocal();

    console.log('%c8068 CAR SQUARE - Enterprise Management System v8.4 (Stable)', 'color: #00d4ff; font-size: 20px; font-weight: bold;');
    console.log(`%cRecords: ${appData.transactions.length} TX | ${appData.customers.length} Customers | ${appData.staff.length} Staff`, 'color: #00ff88;');
    console.log('%c✅ All Export (Excel/PDF/CSV) & Print Functions Fully Operational', 'color: #00ff88;');
    console.log('%c📊 Auto-Commission on Service Complete | Daily Transaction Dashboard with Staff Commission', 'color: #ffaa00;');
</script>
</body>
</html>
