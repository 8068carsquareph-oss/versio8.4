        apiKey: "AIzaSyDummyKeyForDemoPurposesOnly",
        authDomain: "your-project.firebaseapp.com",
        databaseURL: "https://your-project-default-rtdb.firebaseio.com",
        projectId: "your-project",
        storageBucket: "your-project.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };

    const savedConfig = localStorage.getItem("8068_firebase_config_v8");
    if (savedConfig) {
        try {
            const parsed = JSON.parse(savedConfig);
            if (parsed.apiKey && parsed.apiKey !== "AIzaSyDummyKeyForDemoPurposesOnly") {
                firebaseConfig = parsed;
            }
        } catch(e) {}
    }

    let isUsingDemoConfig = firebaseConfig.apiKey === "AIzaSyDummyKeyForDemoPurposesOnly";

    let firebaseApp = null;
    let firebaseDb = null;
    let firebaseInitialized = false;
    let firebaseListeners = [];
    let firebaseIsSyncing = false;
    let firebaseRetryCount = 0;
    let firebaseTotalSynced = 0;
    const MAX_RETRIES = 5;
    const RETRY_DELAY = 2000;
    let firebaseLogs = [];
    let isFirebasePrimary = false;
    let dataLoaded = false;
    let pendingSyncQueue = [];
    let syncTimer = null;
    let isInitialLoad = true;
    let isOnline = true;

    // ======================== DATA SANITIZATION ========================
    function sanitizeDataForFirebase(data) {
        if (data === undefined) return null;
        if (data === null) return null;
        if (typeof data !== 'object') return data;
        if (Array.isArray(data)) {
            return data.map(item => sanitizeDataForFirebase(item));
        }
        const cleaned = {};
        for (const key in data) {
            if (data[key] === undefined) {
                cleaned[key] = null;
            } else if (data[key] === null) {
                cleaned[key] = null;
            } else if (typeof data[key] === 'object') {
                cleaned[key] = sanitizeDataForFirebase(data[key]);
            } else {
                cleaned[key] = data[key];
            }
        }
        return cleaned;
    }

    // ======================== FIREBASE INIT ========================
    function initFirebase() {
        addFirebaseLog('🌐 Initializing Firebase in ONLINE MODE...', 'info');
        
        if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "AIzaSyDummyKeyForDemoPurposesOnly") {
            addFirebaseLog('⚠️ Using demo Firebase config. Please configure your own Firebase project.', 'warn');
        }

        try {
            try {
                firebaseApp = firebase.app();
                addFirebaseLog('✅ Using existing Firebase app', 'success');
            } catch(e) {
                firebaseApp = firebase.initializeApp(firebaseConfig);
                addFirebaseLog('✅ Firebase app initialized', 'success');
            }
            
            firebaseDb = firebase.database();
            
            return new Promise((resolve) => {
                const connRef = firebaseDb.ref('.info/connected');
                let connectionAttempts = 0;
                const maxConnectionAttempts = 3;
                
                const checkConnection = () => {
                    connRef.once('value')
                        .then((snap) => {
                            if (snap.val() === true) {
                                if (!firebaseInitialized) {
                                    firebaseInitialized = true;
                                    isFirebasePrimary = true;
                                    isOnline = true;
                                    addFirebaseLog('✅ Firebase connected as PRIMARY (ONLINE MODE)', 'success');
                                    updateFirebaseStatus('online', 'Primary');
                                    setupFirebaseRealtimeListener();
                                    if (isInitialLoad) {
                                        isInitialLoad = false;
                                        loadAllDataFromFirebase();
                                    }
                                    resolve(true);
                                }
                            } else {
                                connectionAttempts++;
                                if (connectionAttempts < maxConnectionAttempts) {
                                    addFirebaseLog(`🔄 Connection attempt ${connectionAttempts}/${maxConnectionAttempts}...`, 'warn');
                                    setTimeout(checkConnection, 2000);
                                } else {
                                    addFirebaseLog('⚠️ Could not connect to Firebase. Using local cache.', 'warn');
                                    isFirebasePrimary = false;
                                    isOnline = false;
                                    updateFirebaseStatus('offline', 'Local Cache');
                                    loadLocalData();
                                    resolve(false);
                                }
                            }
                        })
                        .catch((err) => {
                            connectionAttempts++;
                            if (connectionAttempts < maxConnectionAttempts) {
                                addFirebaseLog(`🔄 Connection error: ${err.message}. Retrying...`, 'warn');
                                setTimeout(checkConnection, 2000);
                            } else {
                                addFirebaseLog(`❌ Firebase connection failed: ${err.message}`, 'error');
                                isFirebasePrimary = false;
                                isOnline = false;
                                updateFirebaseStatus('error', 'Connection Failed');
                                loadLocalData();
                                resolve(false);
                            }
                        });
                };
                
                connRef.on('value', (snap) => {
                    if (snap.val() === true) {
                        if (!firebaseInitialized) {
                            firebaseInitialized = true;
                            isFirebasePrimary = true;
                            isOnline = true;
                            addFirebaseLog('✅ Firebase connected as PRIMARY (ONLINE MODE)', 'success');
                            updateFirebaseStatus('online', 'Primary');
                            setupFirebaseRealtimeListener();
                            if (isInitialLoad) {
                                isInitialLoad = false;
                                loadAllDataFromFirebase();
                            }
                        } else {
                            isOnline = true;
                            isFirebasePrimary = true;
                            addFirebaseLog('🔄 Firebase reconnected', 'success');
                            updateFirebaseStatus('online', 'Primary');
                            debouncedSync();
                        }
                    } else {
                        if (firebaseInitialized) {
                            addFirebaseLog('⚠️ Firebase disconnected - using local cache', 'warn');
                            isFirebasePrimary = false;
                            isOnline = false;
                            updateFirebaseStatus('offline', 'Local Cache');
                            if (!dataLoaded) {
                                loadLocalData();
                            }
                        }
                    }
                });

                checkConnection();
            });
            
        } catch(e) {
            addFirebaseLog(`❌ Init error: ${e.message}`, 'error');
            isFirebasePrimary = false;
            isOnline = false;
            updateFirebaseStatus('error', 'Init Failed');
            loadLocalData();
            return Promise.resolve(false);
        }
    }

    function loadAllDataFromFirebase() {
        if (!firebaseDb) return;
        addFirebaseLog('📥 Loading data from Firebase...', 'info');
        updateFirebaseStatus('syncing', 'Loading...');
        
        firebaseDb.ref('8068_pos_system_v8').once('value')
            .then((snapshot) => {
                const data = snapshot.val();
                if (data) {
                    addFirebaseLog(`📦 Received ${Object.keys(data).length} collections from Firebase`, 'info');
                    let hasChanges = false;
                    const skipKeys = ['lastUpdated', 'version', '_test_connection'];
                    Object.keys(data).forEach(key => {
                        if (skipKeys.includes(key)) return;
                        if (appData[key] !== undefined && data[key] !== null) {
                            const localStr = JSON.stringify(appData[key]);
                            const remoteStr = JSON.stringify(data[key]);
                            if (localStr !== remoteStr) {
                                appData[key] = data[key];
                                hasChanges = true;
                            }
                        }
                    });
                    if (data.users) {
                        data.users.forEach(remoteUser => {
                            const localUser = appData.users.find(u => u.id === remoteUser.id);
                            if (localUser && remoteUser.password) {
                                remoteUser.password = localUser.password;
                            }
                        });
                        if (JSON.stringify(appData.users) !== JSON.stringify(data.users)) {
                            appData.users = data.users;
                            hasChanges = true;
                        }
                    }
                    if (data.currentUser) {
                        const localUser = appData.users.find(u => u.id === data.currentUser.id);
                        if (localUser) {
                            if (appData.currentUser?.id !== localUser.id) {
                                appData.currentUser = localUser;
                                hasChanges = true;
                            }
                        } else {
                            if (appData.currentUser?.id !== data.currentUser.id) {
                                appData.currentUser = data.currentUser;
                                hasChanges = true;
                            }
                        }
                    }
                    if (!appData.reports) appData.reports = { weekly: [], monthly: [], yearly: [] };
                    if (data.reports) {
                        appData.reports = data.reports;
                        hasChanges = true;
                    }
                    dataLoaded = true;
                    if (hasChanges) {
                        saveToLocal();
                        addFirebaseLog('✅ Data loaded from Firebase', 'success');
                        updateFirebaseStatus('online', 'Primary');
                        renderApp();
                    } else {
                        addFirebaseLog('✅ Data already up to date', 'success');
                        updateFirebaseStatus('online', 'Primary');
                    }
                    return true;
                } else {
                    addFirebaseLog('ℹ️ No data in Firebase, uploading...', 'info');
                    return syncToFirebase(true);
                }
            })
            .catch((error) => {
                addFirebaseLog(`❌ Load error: ${error.message}`, 'error');
                updateFirebaseStatus('error', 'Load Failed');
                loadLocalData();
                return false;
            });
    }

    // ======================== FIREBASE SYNC ========================
    function syncToFirebase(force = false) {
        if (!firebaseDb) {
            addFirebaseLog('❌ Cannot sync: Firebase not ready', 'error');
            return Promise.reject('Firebase not ready');
        }
        if (firebaseIsSyncing && !force) {
            return Promise.resolve('Already syncing');
        }
        if (!isOnline) {
            addFirebaseLog('⏳ Offline - queuing sync for later', 'warn');
            pendingSyncQueue.push({ timestamp: new Date().toISOString() });
            return Promise.resolve('Queued for later');
        }

        firebaseIsSyncing = true;
        updateFirebaseStatus('syncing', 'Syncing...');
        addFirebaseLog('🔄 Syncing to Firebase...', 'info');

        const rawData = {
            services: appData.services || [],
            categories: appData.categories || [],
            customers: appData.customers || [],
            transactions: appData.transactions || [],
            openServices: appData.openServices || [],
            staff: appData.staff || [],
            expenses: appData.expenses || [],
            credits: appData.credits || [],
            inventory: appData.inventory || [],
            systemSettings: appData.systemSettings || {},
            users: appData.users || [],
            currentUser: appData.currentUser || null,
            nextIds: appData.nextIds || {},
            commissionMatrix: appData.commissionMatrix || {},
            reports: appData.reports || { weekly: [], monthly: [], yearly: [] },
            lastUpdated: new Date().toISOString(),
            version: '8.7'
        };

        const dataToSync = sanitizeDataForFirebase(rawData);
        const dataSize = JSON.stringify(dataToSync).length;
        addFirebaseLog(`📦 Syncing ${Object.keys(dataToSync).length} collections (${Math.round(dataSize/1024)} KB)`, 'info');

        return firebaseDb.ref('8068_pos_system_v8').set(dataToSync)
            .then(() => {
                firebaseIsSyncing = false;
                firebaseRetryCount = 0;
                firebaseTotalSynced++;
                isOnline = true;
                localStorage.setItem('8068_last_sync_v8', new Date().toISOString());
                addFirebaseLog('✅ Sync completed!', 'success');
                updateFirebaseStatus('online', 'Primary');
                const syncEl = document.getElementById('syncStatus');
                if (syncEl) {
                    const countEl = syncEl.querySelector('.sync-count');
                    if (countEl) countEl.textContent = firebaseTotalSynced;
                }
                if (pendingSyncQueue.length > 0) {
                    pendingSyncQueue = [];
                    addFirebaseLog('🔄 Processing queued syncs...', 'info');
                }
                return true;
            })
            .catch((error) => {
                firebaseIsSyncing = false;
                isOnline = false;
                addFirebaseLog(`❌ Sync error: ${error.message}`, 'error');
                firebaseRetryCount++;
                if (firebaseRetryCount < MAX_RETRIES) {
                    addFirebaseLog(`🔄 Retry ${firebaseRetryCount}/${MAX_RETRIES} in ${RETRY_DELAY}ms...`, 'warn');
                    updateFirebaseStatus('syncing', `Retry ${firebaseRetryCount}...`);
                    return new Promise((resolve) => {
                        setTimeout(() => {
                            resolve(syncToFirebase(true));
                        }, RETRY_DELAY);
                    });
                } else {
                    updateFirebaseStatus('error', 'Sync Failed');
                    addFirebaseLog('❌ Max retries reached. Will retry later.', 'error');
                    pendingSyncQueue.push({ timestamp: new Date().toISOString() });
                    return false;
                }
            });
    }

    function debouncedSync() {
        if (syncTimer) {
            clearTimeout(syncTimer);
        }
        syncTimer = setTimeout(() => {
            syncTimer = null;
            if (firebaseInitialized && isFirebasePrimary && !firebaseIsSyncing) {
                syncToFirebase();
            } else if (!isOnline) {
                initFirebase().then(() => {
                    if (isOnline) {
                        syncToFirebase();
                    }
                });
            }
        }, 1000);
    }

    function setupFirebaseRealtimeListener() {
        if (!firebaseInitialized || !firebaseDb) return;
        firebaseListeners.forEach(ref => { try { ref.off(); } catch(e) {} });
        firebaseListeners = [];
        addFirebaseLog('🔌 Setting up real-time listener...', 'info');

        const ref = firebaseDb.ref('8068_pos_system_v8');
        ref.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && !firebaseIsSyncing && isFirebasePrimary && isOnline) {
                addFirebaseLog('🔄 Real-time update received', 'info');
                let hasChanges = false;
                const skipKeys = ['lastUpdated', 'version', '_test_connection'];
                Object.keys(data).forEach(key => {
                    if (skipKeys.includes(key)) return;
                    if (appData[key] !== undefined && data[key] !== null) {
                        const localStr = JSON.stringify(appData[key]);
                        const remoteStr = JSON.stringify(data[key]);
                        if (localStr !== remoteStr) {
                            appData[key] = data[key];
                            hasChanges = true;
                        }
                    }
                });
                if (hasChanges) {
                    saveToLocal();
                    addFirebaseLog('✅ Data updated from real-time sync', 'success');
                    updateFirebaseStatus('online', 'Primary');
                    renderApp();
                }
            }
        }, (error) => {
            addFirebaseLog(`⚠️ Listener error: ${error.message}`, 'warn');
            isOnline = false;
            updateFirebaseStatus('offline', 'Listener Lost');
        });
        firebaseListeners.push(ref);
        addFirebaseLog('✅ Real-time listener active', 'success');
    }

    // ======================== RECALCULATE STAFF COMMISSIONS ========================
    function recalculateStaffCommissions() {
        appData.staff.forEach(s => {
            s.totalCommission = 0;
            s.jobsCompleted = 0;
            s.salesGenerated = 0;
            s.weeklyBreakdown = { Sunday: 0, Monday: 0, Tuesday: 0, Wednesday: 0, Thursday: 0, Friday: 0, Saturday: 0 };
            s.weekPart1Total = 0;
            s.weekPart2Total = 0;
            s.monthlyCommission = 0;
            s.dailyCommission = 0;
        });

        appData.transactions.forEach(t => {
            if (t.staffCommissions) {
                const txDate = new Date(t.date);
                const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][txDate.getDay()];
                Object.entries(t.staffCommissions).forEach(([staffId, data]) => {
                    const staff = appData.staff.find(s => s.id === parseInt(staffId));
                    if (staff) {
                        const commission = data.commission || 0;
                        staff.totalCommission = (staff.totalCommission || 0) + commission;
                        staff.jobsCompleted = (staff.jobsCompleted || 0) + (data.jobs || 1);
                        staff.salesGenerated = (staff.salesGenerated || 0) + (t.total || 0);
                        if (staff.weeklyBreakdown) {
                            staff.weeklyBreakdown[dayName] = (staff.weeklyBreakdown[dayName] || 0) + commission;
                        }
                        staff.monthlyCommission = (staff.monthlyCommission || 0) + commission;
                        staff.dailyCommission = (staff.dailyCommission || 0) + commission;
                    }
                });
            }
        });

        appData.staff.forEach(s => {
            if (s.weeklyBreakdown) {
                s.weekPart1Total = (s.weeklyBreakdown.Sunday || 0) + (s.weeklyBreakdown.Monday || 0) + (s.weeklyBreakdown.Tuesday || 0);
                s.weekPart2Total = (s.weeklyBreakdown.Wednesday || 0) + (s.weeklyBreakdown.Thursday || 0) + (s.weeklyBreakdown.Friday || 0) + (s.weeklyBreakdown.Saturday || 0);
            }
        });

        saveToLocal();
    }

    // ======================== GENERATE PERIODIC REPORTS ========================
    function generatePeriodicReport(period) {
        const now = new Date();
        let reportData = {
            period: period,
            generatedAt: now.toISOString(),
            staffCommissions: {},
            totalSales: 0,
            totalCommission: 0,
            totalTransactions: 0,
            breakdown: {}
        };

        let filteredTx = [];
        if (period === 'weekly') {
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            const weekStartStr = weekStart.toISOString().slice(0,10);
            filteredTx = appData.transactions.filter(t => t.date >= weekStartStr);
            reportData.periodLabel = `Week of ${weekStartStr}`;
        } else if (period === 'monthly') {
            const month = now.getMonth();
            const year = now.getFullYear();
            filteredTx = appData.transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === month && d.getFullYear() === year;
            });
            reportData.periodLabel = `${now.toLocaleString('default', { month: 'long' })} ${year}`;
        } else if (period === 'yearly') {
            const year = now.getFullYear();
            filteredTx = appData.transactions.filter(t => new Date(t.date).getFullYear() === year);
            reportData.periodLabel = `Year ${year}`;
        }

        reportData.totalTransactions = filteredTx.length;
        reportData.totalSales = filteredTx.reduce((s, t) => s + t.total, 0);

        const staffMap = {};
        appData.staff.forEach(s => {
            staffMap[s.id] = {
                name: s.name,
                position: s.position,
                tier: s.commissionTier,
                commission: 0,
                jobs: 0,
                sales: 0
            };
        });

        filteredTx.forEach(t => {
            if (t.staffCommissions) {
                Object.entries(t.staffCommissions).forEach(([staffId, data]) => {
                    const sid = parseInt(staffId);
                    if (staffMap[sid]) {
                        staffMap[sid].commission += (data.commission || 0);
                        staffMap[sid].jobs += (data.jobs || 1);
                        staffMap[sid].sales += (t.total || 0);
                    }
                });
            }
        });

        reportData.staffCommissions = staffMap;
        reportData.totalCommission = Object.values(staffMap).reduce((sum, s) => sum + s.commission, 0);

        if (!appData.reports) appData.reports = { weekly: [], monthly: [], yearly: [] };
        if (period === 'weekly') {
            appData.reports.weekly.push(reportData);
            if (appData.reports.weekly.length > 52) appData.reports.weekly.shift();
        } else if (period === 'monthly') {
            appData.reports.monthly.push(reportData);
            if (appData.reports.monthly.length > 12) appData.reports.monthly.shift();
        } else if (period === 'yearly') {
            appData.reports.yearly.push(reportData);
            if (appData.reports.yearly.length > 10) appData.reports.yearly.shift();
        }

        saveToLocal();
        return reportData;
    }

    function getPeriodicReport(period) {
        if (!appData.reports) appData.reports = { weekly: [], monthly: [], yearly: [] };
        const reports = appData.reports[period] || [];
        if (reports.length === 0) {
            return generatePeriodicReport(period);
        }
        return reports[reports.length - 1];
    }

    // ======================== EXPORT FUNCTIONS ========================
    function getFilteredTransactions(period) {
        const now = new Date();
        let filtered = [];
        if (period === 'daily') {
            const todayStr = now.toISOString().slice(0,10);
            filtered = appData.transactions.filter(t => t.date.startsWith(todayStr));
        } else if (period === 'weekly') {
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            const weekStartStr = weekStart.toISOString().slice(0,10);
            filtered = appData.transactions.filter(t => t.date >= weekStartStr);
        } else if (period === 'monthly') {
            const month = now.getMonth();
            const year = now.getFullYear();
            filtered = appData.transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === month && d.getFullYear() === year;
            });
        } else if (period === 'yearly') {
            const year = now.getFullYear();
            filtered = appData.transactions.filter(t => new Date(t.date).getFullYear() === year);
        }
        return filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function generateExcel(data, columns, title, filename) {
        const wb = XLSX.utils.book_new();
        const wsData = [columns.map(c => c.header)];
        data.forEach(row => {
            wsData.push(columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
        });
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!cols'] = columns.map(() => ({ wch: 20 }));
        ws['!rows'] = [{ hpx: 30 }];
        XLSX.utils.book_append_sheet(wb, ws, title);
        XLSX.writeFile(wb, `${filename}_${new Date().toISOString().slice(0,10)}.xlsx`);
        return true;
    }

    function generateCSV(data, columns, filename) {
        let csv = columns.map(c => c.header).join(',') + '\n';
        data.forEach(row => {
            csv += columns.map(c => `"${row[c.key] !== undefined ? row[c.key] : ''}"`).join(',') + '\n';
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${filename}_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        return true;
    }

    function generatePDF(data, columns, title, filename, logo) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        if (logo) {
            try {
                doc.addImage(logo, 'JPEG', pageWidth/2 - 20, 5, 40, 20);
            } catch(e) {}
        }
        doc.setFontSize(16);
        doc.text(title, pageWidth/2, 30, { align: 'center' });
        doc.setFontSize(10);
        doc.text(`Generated: ${new Date().toLocaleString()}`, pageWidth/2, 38, { align: 'center' });
        doc.text(`Company: ${appData.systemSettings.companyName}`, pageWidth/2, 44, { align: 'center' });
        
        const tableData = data.map(row => columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
        doc.autoTable({
            head: [columns.map(c => c.header)],
            body: tableData,
            startY: 50,
            styles: { fontSize: 8, cellPadding: 2 },
            headStyles: { fillColor: [0, 212, 255], textColor: [0,0,0], fontStyle: 'bold' },
            alternateRowStyles: { fillColor: [240, 240, 240] },
            didDrawPage: function(data) {
                doc.setFontSize(8);
                doc.text(`Page ${data.pageNumber}`, pageWidth - 20, doc.internal.pageSize.getHeight() - 10);
            }
        });
        doc.save(`${filename}_${new Date().toISOString().slice(0,10)}.pdf`);
        return true;
    }

    // POS Cart Operations
    function addToCart(serviceId, size, price, serviceName, remark, staff) {
        posCart.push({ 
            serviceId, 
            serviceName, 
            variant: size, 
            price, 
            quantity: 1, 
            total: price, 
            assignedStaff: staff || [], 
            remarks: remark || "" 
        });
        renderApp();
    }

    function removeCartItem(idx) { 
        if (idx >= 0 && idx < posCart.length) {
            posCart.splice(idx, 1); 
            renderApp(); 
        }
    }

    function updateCartQuantity(idx, qty) { 
        if (qty > 0 && idx >= 0 && idx < posCart.length) { 
            posCart[idx].quantity = parseInt(qty); 
            posCart[idx].total = posCart[idx].price * posCart[idx].quantity; 
            renderApp(); 
        }
    }

    function addItemRemark(idx) { 
        if (idx >= 0 && idx < posCart.length) {
            const remark = prompt("Enter remark for this service:", posCart[idx].remarks || ""); 
            if (remark !== null) { 
                posCart[idx].remarks = remark; 
                renderApp(); 
            }
        }
    }

    function reassignStaff(idx, name, size) {
        if (idx >= 0 && idx < posCart.length) {
            showStaffAssignmentModal(idx, name, size);
        }
    }

    function calcSubtotal() { 
        return posCart.reduce((sum,item) => sum + item.total, 0); 
    }

    function calcTotal() { 
        let total = calcSubtotal() - discount - loyaltyPointsUsed; 
        return total > 0 ? total : 0; 
    }

    // Complete Sale
    function completeSaleWrapper() {
        selectedPayment = document.getElementById('paymentMethod')?.value || "Cash";
        cashTendered = parseFloat(document.getElementById('cashTenderedInput')?.value || 0);
        discount = parseFloat(document.getElementById('discountInput')?.value || 0);
        loyaltyPointsUsed = parseFloat(document.getElementById('loyaltyUse')?.value || 0);
        cartRemarks = document.getElementById('cartRemarksInput')?.value || "";
        completeSale();
    }

    function completeSale() {
        if(posCart.length === 0) { alert("Please add services to cart!"); return; }
        const total = calcTotal();
        
        const isCredit = selectedPayment === 'Credit (Utang)';
        if (isCredit) {
            if (!selectedCustomer) {
                alert("Please select a customer for credit transaction!");
                return;
            }
            appData.credits.push({
                id: 'CR-' + new Date().getFullYear() + '-' + (appData.nextIds.credit++),
                customerName: selectedCustomer.name,
                contact: selectedCustomer.mobile || '',
                transactionId: 'PENDING-' + Date.now(),
                amount: total,
                paid: 0,
                balance: total,
                date: new Date().toISOString().slice(0,10),
                status: 'pending'
            });
        }
        
        if(selectedPayment === "Cash" && cashTendered < total) { alert("Insufficient cash!"); return; }
        
        const staffCommissionMap = new Map();
        posCart.forEach(item => { 
            if(item.assignedStaff) {
                item.assignedStaff.forEach(staff => { 
                    const current = staffCommissionMap.get(staff.id) || { commission: 0, jobs: 0, name: staff.name, tier: staff.commissionTier }; 
                    current.commission += staff.splitCommission; 
                    current.jobs += 1; 
                    staffCommissionMap.set(staff.id, current); 
                });
            }
        });
        
        const transaction = { 
            id: generateReceiptNo(), 
            date: new Date().toISOString(), 
            customer: selectedCustomer ? selectedCustomer.name : "Walk-in Customer", 
            customerId: selectedCustomer?.id || null,
            vehicle: vehicleInfo.model || "N/A", 
            plate: vehicleInfo.plate || "N/A", 
            items: posCart.map(i => ({ ...i })), 
            staffCommissions: Object.fromEntries([...staffCommissionMap.entries()]), 
            subtotal: calcSubtotal(), 
            discount, 
            loyaltyUsed: loyaltyPointsUsed, 
            total, 
            paymentMethod: selectedPayment,
            isCredit: isCredit,
            cashTendered: selectedPayment === "Cash" ? cashTendered : total, 
            change: selectedPayment === "Cash" ? (cashTendered - total) : 0,
            remarks: cartRemarks + (isCredit ? ' (CREDIT - PENDING)' : ''),
            itemRemarks: posCart.map(i => ({ service: i.serviceName, remark: i.remarks || 'None' }))
        };
        
        appData.transactions.unshift(transaction);
        staffCommissionMap.forEach((data, staffId) => { 
            const staff = appData.staff.find(s => s.id === staffId); 
            if(staff) { 
                staff.totalCommission = (staff.totalCommission || 0) + data.commission; 
                staff.jobsCompleted = (staff.jobsCompleted || 0) + data.jobs; 
                staff.salesGenerated = (staff.salesGenerated || 0) + transaction.items.filter(i => i.assignedStaff?.some(s => s.id === staffId)).reduce((sum, i) => sum + i.total, 0); 
            } 
        });
        
        if(selectedCustomer && !isCredit) { 
            let earnedPoints = Math.floor(total * appData.systemSettings.loyaltyPointsPerPeso); 
            selectedCustomer.loyaltyPoints = (selectedCustomer.loyaltyPoints || 0) + earnedPoints; 
            const idx = appData.customers.findIndex(c=>c.id === selectedCustomer.id); 
            if(idx !== -1) appData.customers[idx].loyaltyPoints = selectedCustomer.loyaltyPoints; 
        }
        
        saveToLocal();
        recalculateStaffCommissions();
        generatePeriodicReport('weekly');
        generatePeriodicReport('monthly');
        generatePeriodicReport('yearly');
        alert(`✅ SALE COMPLETED!\nTotal: ₱${total.toFixed(2)}${isCredit ? '\n⚠️ CREDIT (UTANG) - PENDING PAYMENT' : ''}`);
        printReceipt(transaction);
        posCart = []; 
        selectedCustomer = null; 
        vehicleInfo = { plate: "", model: "", size: "Medium" }; 
        discount = 0; 
        loyaltyPointsUsed = 0; 
        cashTendered = 0; 
        cartRemarks = "";
        renderApp();
    }

    // Save as Open Service
    function saveAsOpenService() {
        if(posCart.length === 0) { alert("Please add services to cart!"); return; }
        const customer = selectedCustomer ? selectedCustomer.name : prompt("Customer name:") || "Walk-in Customer";
        const vehicle = vehicleInfo.model || prompt("Vehicle model:") || "N/A";
        const plate = vehicleInfo.plate || prompt("Plate number:") || "N/A";
        const total = calcTotal();
        const staff = posCart.flatMap(i => i.assignedStaff || []).filter((v, i, a) => a.findIndex(t => t.id === v.id) === i);
        
        const openService = {
            id: "OS-" + new Date().getFullYear() + "-" + (appData.nextIds.openService++),
            customer: customer,
            vehicle: vehicle,
            plate: plate,
            items: posCart.map(i => ({ ...i })),
            total: total,
            staff: staff,
            remarks: cartRemarks,
            status: 'pending',
            createdAt: new Date().toISOString(),
            completedAt: null,
            paidAt: null,
            commissionProcessed: false
        };
        appData.openServices.push(openService);
        saveToLocal();
        alert(`✅ Service saved as Open Service!\nTotal: ₱${total.toFixed(2)}`);
        posCart = [];
        selectedCustomer = null;
        vehicleInfo = { plate: "", model: "", size: "Medium" };
        discount = 0;
        loyaltyPointsUsed = 0;
        cartRemarks = "";
        renderApp();
    }

    // Select Customer
    function selectCustomerPopup() {
        const name = prompt("Customer name:"); 
        if(name) { 
            let existing = appData.customers.find(c => c.name.toLowerCase() === name.toLowerCase()); 
            if(existing) { 
                selectedCustomer = existing; 
            } else { 
                let newCust = { id: Date.now(), name, loyaltyPoints: 0, mobile: "", vehicleInfo: "", plate: "" }; 
                appData.customers.push(newCust); 
                selectedCustomer = newCust; 
            } 
            renderApp(); 
        }
    }

    function updateOpenServiceStatus(id, status) {
        const service = appData.openServices.find(s => s.id === id);
        if(service) {

            if(status === 'completed') {
                service.completedAt = new Date().toISOString();
                processOpenServiceCommission(service, true);
            }
            saveToLocal();
            renderApp();
        }
    }

    function processOpenServiceCommission(service, suppressTransaction = false) {
        if (service.commissionProcessed) return;
        if (!service.staff || service.staff.length === 0) return;

        const staffCommissionMap = new Map();
        service.items.forEach(item => {
            if (item.assignedStaff && item.assignedStaff.length > 0) {
                item.assignedStaff.forEach(staff => {
                    const commissionAmt = getCommissionAmount(item.serviceName, item.variant, staff.commissionTier);
                    const splitCommission = item.assignedStaff.length === 2 ? commissionAmt / 2 : commissionAmt;
                    
                    const current = staffCommissionMap.get(staff.id) || { 
                        commission: 0, 
                        jobs: 0, 
                        name: staff.name, 
                        tier: staff.commissionTier,
                        serviceTotal: 0
                    };
                    current.commission += splitCommission;
                    current.jobs += 1;
                    current.serviceTotal += item.total;
                    staffCommissionMap.set(staff.id, current);
                });
            }
        });

        service.pendingCommission = {
            staffMap: Object.fromEntries([...staffCommissionMap.entries()].map(([id, data]) => [id, { 
                commission: data.commission, 
                tier: data.tier, 
                name: data.name,
                jobs: data.jobs
            }])),
            total: service.total
        };

        if (!suppressTransaction) {
            finalizeServiceTransaction(service);
        } else {
            service.commissionProcessed = true;
            saveToLocal();
        }
    }

    function finalizeServiceTransaction(service) {
        if (!service.pendingCommission) {
            processOpenServiceCommission(service, false);
            if (!service.pendingCommission) return;
        }

        const staffMap = service.pendingCommission.staffMap || {};
        
        const transaction = {
            id: generateReceiptNo(),
            date: service.completedAt || new Date().toISOString(),
            customer: service.customer,
            vehicle: service.vehicle,
            plate: service.plate,
            items: service.items.map(i => ({ ...i })),
            staffCommissions: staffMap,
            subtotal: service.total,
            discount: 0,
            loyaltyUsed: 0,
            total: service.total,
            paymentMethod: 'Open Service (Completed)',
            cashTendered: service.total,
            change: 0,
            remarks: service.remarks + ' (Completed Service)',
            isOpenService: true,
            openServiceId: service.id,
            isCommissionAutoGenerated: true
        };

        const existingTx = appData.transactions.find(t => t.openServiceId === service.id && t.isCommissionAutoGenerated);
        if (!existingTx) {
            appData.transactions.unshift(transaction);
            
            Object.entries(staffMap).forEach(([staffId, data]) => {
                const staffMember = appData.staff.find(s => s.id === parseInt(staffId));
                if(staffMember) {
                    staffMember.totalCommission = (staffMember.totalCommission || 0) + data.commission;
                    staffMember.jobsCompleted = (staffMember.jobsCompleted || 0) + data.jobs;
                    staffMember.salesGenerated = (staffMember.salesGenerated || 0) + service.total;
                }
            });

            service.commissionProcessed = true;
            service.transactionId = transaction.id;
            delete service.pendingCommission;
            
            saveToLocal();
            recalculateStaffCommissions();
            generatePeriodicReport('weekly');
            generatePeriodicReport('monthly');
            generatePeriodicReport('yearly');
            renderApp();
        }
    }

    function completeOpenServicePayment(id, paymentMethod, cashTendered) {
        const service = appData.openServices.find(s => s.id === id);
        if(!service) return;
        const total = service.total;
        if(paymentMethod === "Cash" && cashTendered < total) {
            alert("Insufficient cash!");
            return;
        }
        
        if (!service.commissionProcessed) {
            processOpenServiceCommission(service, false);
        } else if (service.commissionProcessed && !service.transactionId) {
            finalizeServiceTransaction(service);
        }
        
        const existingTx = appData.transactions.find(t => t.openServiceId === service.id && t.isCommissionAutoGenerated);
        if (existingTx) {
            existingTx.paymentMethod = paymentMethod;
            existingTx.cashTendered = paymentMethod === "Cash" ? cashTendered : total;
            existingTx.change = paymentMethod === "Cash" ? (cashTendered - total) : 0;
            existingTx.isCredit = paymentMethod === 'Credit (Utang)';
            if (paymentMethod === 'Credit (Utang)') {
                existingTx.remarks = (existingTx.remarks || '') + ' (CREDIT - PENDING)';
            }
            saveToLocal();
        } else {
            const transaction = {
                id: generateReceiptNo(),
                date: new Date().toISOString(),
                customer: service.customer,
                vehicle: service.vehicle,
                plate: service.plate,
                items: service.items.map(i => ({ ...i })),
                subtotal: total,
                discount: 0,
                loyaltyUsed: 0,
                total: total,
                paymentMethod: paymentMethod,
                cashTendered: paymentMethod === "Cash" ? cashTendered : total,
                change: paymentMethod === "Cash" ? (cashTendered - total) : 0,
                remarks: service.remarks + (paymentMethod === 'Credit (Utang)' ? ' (CREDIT - PENDING)' : ''),
                isOpenService: true,
                openServiceId: service.id,
                staffCommissions: service.staffCommissions || {}
            };
            appData.transactions.unshift(transaction);
            saveToLocal();
            recalculateStaffCommissions();
        }
        
        if (paymentMethod === 'Credit (Utang)') {
            appData.credits.push({
                id: 'CR-' + new Date().getFullYear() + '-' + (appData.nextIds.credit++),
                customerName: service.customer,
                contact: '',
                transactionId: existingTx ? existingTx.id : 'PENDING-' + Date.now(),
                amount: total,
                paid: 0,
                balance: total,
                date: new Date().toISOString().slice(0,10),
                status: 'pending'
            });
            saveToLocal();
        }
        
        service.paidAt = new Date().toISOString();
        service.status = 'paid';
        saveToLocal();
        recalculateStaffCommissions();
        generatePeriodicReport('weekly');
        generatePeriodicReport('monthly');
        generatePeriodicReport('yearly');
        alert(`✅ Payment Completed!\nTotal: ₱${total.toFixed(2)}`);
        
        const txToPrint = appData.transactions.find(t => t.openServiceId === service.id);
        if (txToPrint) printReceipt(txToPrint);
        appData.openServices = appData.openServices.filter(s => s.id !== id);
        renderApp();
    }

    window.confirmAddService = () => {
        const name = document.getElementById('newServiceName')?.value; if(!name) { alert("Name required!"); return; }
        const desc = document.getElementById('newServiceDesc')?.value || "";
        const category = document.getElementById('newServiceCat')?.value || "Specialty";

        const pricesArr = document.getElementById('newServicePrices')?.value.split(',').map(p => parseFloat(p.trim()));

            if (price) {
                const tier30 = Math.round(price * 0.26);
                const tier35 = Math.round(price * 0.30);

            if(newName) { 
                const oldName = s.name; 
                s.name = newName.toUpperCase(); 
                const newMatrix = {};
                Object.keys(appData.commissionMatrix).forEach(key => {
                    if (key.startsWith(oldName)) {
                        const newKey = key.replace(oldName, s.name);

                        newMatrix[key] = appData.commissionMatrix[key];
                    }
                });
                appData.commissionMatrix = newMatrix;
                saveToLocal(); renderApp(); 
            } 
        }

        let s = appData.services.find(s=>s.id===id); 
        if(s) { 
            let size = prompt("Size to edit:", s.sizes[0]); 
            let price = parseFloat(prompt("New price:")); 
            if(size && price) { 
                s.prices[size] = price; 
                const key = `${s.name}_${size}`;
                const tier30 = Math.round(price * 0.26);
                const tier35 = Math.round(price * 0.30);

            saveToLocal(); 
            renderApp(); 
        } 
    };
    window.deleteServiceItem = (id) => { 
        if(confirm("Delete this service?")) { 
            const service = appData.services.find(s => s.id === id); 
            if(service) { 
                Object.keys(appData.commissionMatrix).forEach(key => {
                    if (key.startsWith(service.name)) {
                        delete appData.commissionMatrix[key];
                    }
                });
                appData.services = appData.services.filter(s => s.id !== id);
                saveToLocal(); renderApp(); 
            } 
        } 
    };

        const val35 = parseFloat(document.getElementById('addComm35')?.value);
        const val40 = parseFloat(document.getElementById('addComm40')?.value);
        if (!service || !size) { alert("Service and size required!"); return; }
        const key = `${service}_${size}`;
        if (!isNaN(val30) && !isNaN(val35) && !isNaN(val40)) {
            appData.commissionMatrix[key] = [val30, val35, val40];
            saveToLocal(); closeAdminModal(); renderApp();
        }
    };
    window.autoGenerateCommissions = () => {
        if(confirm("Auto-generate commissions based on service prices?")) {
            appData.services.forEach(service => {
                service.sizes.forEach(size => {
                    const price = service.prices[size];
                    if (price) {
                        const tier30 = Math.round(price * 0.26);
                        const tier35 = Math.round(price * 0.30);
                        const tier40 = Math.round(price * 0.35);
                        const key = `${service.name}_${size}`;
                        appData.commissionMatrix[key] = [tier30, tier35, tier40];
                    }
                });
            });
            saveToLocal(); renderApp(); alert("Commissions auto-generated!");
        }
    };

        if(confirm("Reset commission matrix to default?")) {
            appData.commissionMatrix = initializeCommissionMatrix();
            saveToLocal(); renderApp();

    window.testFirebaseConfig = function() {
        const config = {
            apiKey: document.getElementById('fbApiKey')?.value?.trim() || '',
            authDomain: document.getElementById('fbAuthDomain')?.value?.trim() || '',
            databaseURL: document.getElementById('fbDbUrl')?.value?.trim() || '',
            projectId: document.getElementById('fbProjectId')?.value?.trim() || '',
            storageBucket: document.getElementById('fbStorageBucket')?.value?.trim() || '',
            messagingSenderId: document.getElementById('fbMessagingSenderId')?.value?.trim() || '',
            appId: document.getElementById('fbAppId')?.value?.trim() || ''
        };

        if (!config.apiKey || !config.databaseURL) {
            alert("Please enter at least API Key and Database URL");
            return;
        }

        addFirebaseLog('🔍 Testing connection...', 'info');
        
        try {
            let testApp;
            try {
                testApp = firebase.initializeApp(config, 'testApp');
            } catch(e) {
                if (e.message.includes('already exists')) {
                    testApp = firebase.app('testApp');
                } else {
                    throw e;
                }
            }
            const testDb = firebase.database(testApp);
            const testRef = testDb.ref('_test_connection');
            
            testRef.set({
                test: 'connection',
                timestamp: new Date().toISOString(),
                device: navigator.userAgent || 'unknown'
            }).then(() => {
                addFirebaseLog('✅ Connection test successful!', 'success');
                alert('✅ Firebase connection successful! Your credentials are valid.');
                testDb.ref('_test_connection').remove();
                try { firebase.app('testApp').delete(); } catch(e) {}
            }).catch((error) => {
                addFirebaseLog(`❌ Connection test failed: ${error.message}`, 'error');
                alert(`❌ Connection failed: ${error.message}\n\nCheck your Database URL and Security Rules.`);
                try { firebase.app('testApp').delete(); } catch(e) {}
            });
        } catch(e) {
            addFirebaseLog(`❌ Test error: ${e.message}`, 'error');
            alert(`❌ Error: ${e.message}`);
        }
    };

    window.saveFirebaseConfig = function() {
        const config = {
            apiKey: document.getElementById('fbApiKey')?.value?.trim() || '',
            authDomain: document.getElementById('fbAuthDomain')?.value?.trim() || '',
            databaseURL: document.getElementById('fbDbUrl')?.value?.trim() || '',
            projectId: document.getElementById('fbProjectId')?.value?.trim() || '',
            storageBucket: document.getElementById('fbStorageBucket')?.value?.trim() || '',
            messagingSenderId: document.getElementById('fbMessagingSenderId')?.value?.trim() || '',
            appId: document.getElementById('fbAppId')?.value?.trim() || ''
        };

        if (!config.apiKey || !config.databaseURL) {
            alert("Please enter at least API Key and Database URL");
            return;
        }

        firebaseConfig = config;
        localStorage.setItem("8068_firebase_config_v8", JSON.stringify(config));
        isUsingDemoConfig = false;

        try {
            if (firebaseApp) {
                try { firebaseApp.delete(); } catch(e) {}
                firebaseApp = null;
                firebaseDb = null;
                firebaseInitialized = false;
                isFirebasePrimary = false;
                firebaseListeners.forEach(ref => { try { ref.off(); } catch(e) {} });
                firebaseListeners = [];
            }

            initFirebase().then((success) => {
                if (success) {
                    setupFirebaseRealtimeListener();
                    closeAdminModal();
                    renderApp();
                    alert('✅ Firebase connected successfully! All data will now sync in real-time.');
                } else {
                    alert('❌ Failed to connect to Firebase. Check your configuration and try again.');
                }
            });
        } catch(e) {
            alert('❌ Firebase error: ' + e.message);
        }
    };

    // ======================== WEEKLY COMMISSION REPORT ========================
    function renderWeeklyCommissionReport() {
        if(showLogin) return renderLogin();
        recalculateStaffCommissions();

        const now = new Date();
        const currentWeekStart = new Date(now);
        currentWeekStart.setDate(now.getDate() - now.getDay());
        const weekStartStr = currentWeekStart.toISOString().slice(0,10);
        const weekEnd = new Date(currentWeekStart);
        weekEnd.setDate(currentWeekStart.getDate() + 6);
        const weekEndStr = weekEnd.toISOString().slice(0,10);

        const weekTx = appData.transactions.filter(t => t.date >= weekStartStr && t.date <= weekEndStr);
        
        const weekStaffMap = {};
        appData.staff.forEach(s => {
            weekStaffMap[s.id] = {
                name: s.name,
                position: s.position,
                tier: s.commissionTier,
                jobs: 0,
                sales: 0,
                sunday: 0, monday: 0, tuesday: 0, wednesday: 0, thursday: 0, friday: 0, saturday: 0,
                total: 0,
                part1: 0,
                part2: 0
            };
        });

        weekTx.forEach(t => {
            if (t.staffCommissions) {
                const txDate = new Date(t.date);
                const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][txDate.getDay()];
                Object.entries(t.staffCommissions).forEach(([staffId, data]) => {
                    const staffIdNum = parseInt(staffId);
                    if (weekStaffMap[staffIdNum]) {
                        const comm = data.commission || 0;
                        weekStaffMap[staffIdNum].jobs += (data.jobs || 1);
                        weekStaffMap[staffIdNum].sales += (t.total || 0);
                        weekStaffMap[staffIdNum].total += comm;
                        weekStaffMap[staffIdNum][dayName.toLowerCase()] = (weekStaffMap[staffIdNum][dayName.toLowerCase()] || 0) + comm;
                    }
                });
            }
        });

        Object.values(weekStaffMap).forEach(s => {
            s.part1 = (s.sunday || 0) + (s.monday || 0) + (s.tuesday || 0);
            s.part2 = (s.wednesday || 0) + (s.thursday || 0) + (s.friday || 0) + (s.saturday || 0);
        });

        let tableRows = '';
        let grandTotal = 0;
        let grandJobs = 0;
        let grandSales = 0;
        let grandSunday = 0, grandMonday = 0, grandTuesday = 0, grandWednesday = 0, grandThursday = 0, grandFriday = 0, grandSaturday = 0;
        let grandPart1 = 0, grandPart2 = 0;
        
        Object.values(weekStaffMap).forEach(s => {
            grandTotal += s.total;
            grandJobs += s.jobs;
            grandSales += s.sales;
            grandSunday += (s.sunday || 0);
            grandMonday += (s.monday || 0);
            grandTuesday += (s.tuesday || 0);
            grandWednesday += (s.wednesday || 0);
            grandThursday += (s.thursday || 0);
            grandFriday += (s.friday || 0);
            grandSaturday += (s.saturday || 0);
            grandPart1 += s.part1;
            grandPart2 += s.part2;
            
            tableRows += `<tr class="border-b border-gray-700 hover:bg-gray-800 transition">
                <td class="py-2 font-semibold text-left">${s.name}</td>
                <td class="text-center">${s.position}</td>
                <td class="text-center"><span class="commission-badge">${s.tier}%</span></td>
                <td class="text-center">${s.jobs}</td>
                <td class="text-center text-cyan-300">₱${(s.sunday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.monday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.tuesday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.wednesday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.thursday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.friday||0).toFixed(2)}</td>
                <td class="text-center text-cyan-300">₱${(s.saturday||0).toFixed(2)}</td>
                <td class="text-center text-yellow-400 font-bold">₱${s.part1.toFixed(2)}</td>
                <td class="text-center text-yellow-400 font-bold">₱${s.part2.toFixed(2)}</td>
                <td class="text-center text-green-400 font-bold">₱${s.total.toFixed(2)}</td>
            </tr>`;
        });

        return `<div class="card-premium p-6">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h3 class="text-2xl font-bold"><i class="fas fa-calendar-week"></i> Weekly Commission Report</h3>

                    <p class="text-xs text-green-400"><i class="fas fa-sync"></i> Auto-calculated from all transactions</p>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="exportWeeklyCommissionExcel()" class="excel-export-btn px-4 py-2 rounded text-sm text-white"><i class="fas fa-file-excel"></i> Excel</button>
                    <button onclick="exportWeeklyCommissionPDF()" class="pdf-export-btn px-4 py-2 rounded text-sm text-white"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button onclick="exportWeeklyCommissionCSV()" class="csv-export-btn px-4 py-2 rounded text-sm text-white"><i class="fas fa-file-csv"></i> CSV</button>
                    <button onclick="printWeeklyCommission()" class="bg-cyan-600 px-4 py-2 rounded text-sm"><i class="fas fa-print"></i> Print</button>
                </div>
            </div>
            <div class="overflow-x-auto max-h-96 overflow-y-auto">
                <table class="w-full text-sm commission-report-grid">
                    <thead>
                        <tr>
                            <th class="text-left">Staff</th>

        const c = appData.credits.find(cr => cr.id === id);
        if(c) {
            const val = prompt("Edit contact:", c.contact || '');
            if(val !== null) { c.contact = val; saveToLocal(); renderApp(); }
        }
    };
    window.editCreditAmount = (id) => {
        const c = appData.credits.find(cr => cr.id === id);
        if(c) {
            const val = parseFloat(prompt("Edit amount:", c.amount));
            if(!isNaN(val) && val > 0) { 
                const diff = val - c.amount;
                c.amount = val;
                c.balance = (c.balance || 0) + diff;
                saveToLocal(); renderApp();
            }
        }
    };
    window.editCreditPaid = (id) => {
        const c = appData.credits.find(cr => cr.id === id);
        if(c) {
            const val = parseFloat(prompt("Edit paid amount:", c.paid || 0));
            if(!isNaN(val) && val >= 0) {
                const newPaid = val;
                const paidDiff = newPaid - (c.paid || 0);
                c.paid = newPaid;
                c.balance = (c.balance || 0) - paidDiff;
                if (c.balance <= 0) { c.balance = 0; c.status = 'paid'; }
                saveToLocal(); renderApp();
            }
        }
    };
    window.addCreditPayment = (id) => {
        const c = appData.credits.find(cr => cr.id === id);
        if(c) {
            const val = parseFloat(prompt("Enter payment amount:", 0));
            if(!isNaN(val) && val > 0 && val <= (c.balance || 0)) {
                c.paid = (c.paid || 0) + val;
                c.balance = (c.balance || 0) - val;
                if (c.balance <= 0) { c.balance = 0; c.status = 'paid'; }
                saveToLocal(); renderApp();
                alert(`✅ Payment of ₱${val.toFixed(2)} recorded. Remaining balance: ₱${c.balance.toFixed(2)}`);
            } else {
                alert("Invalid amount or exceeds balance.");
            }
        }
    };

    window.exportReportSummaryExcel = () => {
        const wb = XLSX.utils.book_new();
        const today = new Date();
        let data = [
            [`${appData.systemSettings.companyName} - Report Summary`],
            [`Generated: ${new Date().toLocaleString()}`],
            [`Period: ${reportPeriod.toUpperCase()}`],
            [],
            ['Summary'],
            ['Metric', 'Amount'],
            ['Total Sales', appData.transactions.reduce((s,t)=>s+t.total,0)],
            ['Total Expenses', appData.expenses.reduce((s,e)=>s+e.amount,0)],
            ['Net Profit', appData.transactions.reduce((s,t)=>s+t.total,0) - appData.expenses.reduce((s,e)=>s+e.amount,0)],
            ['Total Commission', appData.staff.reduce((sum, s) => sum + (s.totalCommission || 0), 0)],
            [],
            ['Daily Breakdown'],
            ['Date', 'Sales', 'Expenses', 'Commission']
        ];
        for (let i = 29; i >= 0; i--) {
            const d = new Date(today);
            d.setDate(today.getDate() - i);
            const dateStr = d.toISOString().slice(0,10);
            const daySales = appData.transactions.filter(t => t.date.startsWith(dateStr)).reduce((s,t)=>s+t.total,0);
            const dayExpenses = appData.expenses.filter(e => e.date === dateStr).reduce((s,e)=>s+e.amount,0);
            const dayCommission = appData.transactions.filter(t => t.date.startsWith(dateStr) && t.staffCommissions)
                .reduce((sum, t) => sum + Object.values(t.staffCommissions).reduce((s, st) => s + (st.commission || 0), 0), 0);
            data.push([d.toLocaleDateString(), daySales, dayExpenses, dayCommission]);
        }
        const ws = XLSX.utils.aoa_to_sheet(data);
        ws['!cols'] = data[0].map(() => ({ wch: 20 }));
        XLSX.utils.book_append_sheet(wb, ws, 'Report Summary');
        XLSX.writeFile(wb, `report_summary_${new Date().toISOString().slice(0,10)}.xlsx`);
        alert('✅ Report Summary exported to Excel!');
    };

    function renderApp() {
        if(showLogin) {
            document.getElementById("mainContent").innerHTML = renderLogin();
            return;
        }
        const main = document.getElementById("mainContent");
        if(!main) return;
        let content = "";
        if(currentView === "dashboard") content = renderDashboard();
        else if(currentView === "pos") content = renderPOS();
        else if(currentView === "openservices") content = renderOpenServices();
        else if(currentView === "customers") content = renderCustomers();
        else if(currentView === "staff") content = renderStaffDashboard();
        else if(currentView === "admin") content = renderAdminDashboard();
        else if(currentView === "reports") content = renderReportSummaries();
        else if(currentView === "commission") content = renderCommissionReports();
        main.innerHTML = content;
        setTimeout(() => {
            document.getElementById('plateInput')?.addEventListener('input', (e) => vehicleInfo.plate = e.target.value);
            document.getElementById('modelInput')?.addEventListener('input', (e) => vehicleInfo.model = e.target.value);
            handlePaymentChange();
        }, 50);
        updateClock();
        saveToLocal();
    }

    window.navigate = (view) => { 
        currentView = view; 
        mobileNavOpen = false;
        renderApp(); 
    };

    window.navigateAdmin = (panel) => { 
        currentAdminPanel = panel; 
        renderApp(); 
    };

    window.closeAdminModal = () => document.getElementById('adminModal')?.remove();

    // ======================== LIVE CLOCK ========================
    function updateClock() {
        const now = new Date();
        const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        const clockEl = document.getElementById('liveClock');
        if(clockEl) clockEl.textContent = now.toLocaleDateString('en-US', options);
    }
    setInterval(updateClock, 1000);

    // ======================== UI ========================
    function toggleMobileNav() {
        mobileNavOpen = !mobileNavOpen;
        const nav = document.getElementById('mobileNav');
        if(nav) nav.classList.toggle('open');
    }

    // Initialize Firebase on load - ONLINE MODE
    loadLocalData();
    initFirebase().then((success) => {
        if (!success) {
            addFirebaseLog('ℹ️ Running in offline mode with local cache. Data will sync when connection is restored.', 'warn');
            updateFirebaseStatus('offline', 'Local Cache');
        }
        renderApp();
    });

                        }

                        <span class="company-subtitle">One Stop Shop <span class="company-version">| v8.7</span></span>
                    </div>
                </div>

                <!-- Desktop Navigation -->
                <div class="header-nav" id="desktopNav">
                    <button class="nav-btn ${currentView === 'pos' ? 'active' : ''}" onclick="navigate('pos')"><i class="fas fa-cash-register"></i> POS</button>
                    <button class="nav-btn ${currentView === 'dashboard' ? 'active' : ''}" onclick="navigate('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
                    <button class="nav-btn ${currentView === 'openservices' ? 'active' : ''}" onclick="navigate('openservices')"><i class="fas fa-clipboard-list"></i> Open</button>
                    <button class="nav-btn ${currentView === 'staff' ? 'active' : ''}" onclick="navigate('staff')"><i class="fas fa-id-badge"></i> Staff</button>
                    <button class="nav-btn ${currentView === 'customers' ? 'active' : ''}" onclick="navigate('customers')"><i class="fas fa-users"></i> Customers</button>
                    <button class="nav-btn ${currentView === 'admin' ? 'active' : ''}" onclick="navigate('admin')"><i class="fas fa-crown"></i> Admin</button>
                    <button class="nav-btn ${currentView === 'reports' ? 'active' : ''}" onclick="navigate('reports')"><i class="fas fa-chart-bar"></i> Reports</button>
                    <button class="nav-btn ${currentView === 'commission' ? 'active' : ''}" onclick="navigate('commission')"><i class="fas fa-percent"></i> Commissions</button>
                </div>

                <div class="header-user">
                    <span class="user-name"><i class="fas fa-user-circle"></i> ${appData.currentUser?.name || 'Guest'}</span>
                    <span class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</span>
                    <span id="syncStatus" class="sync-status"><i class="fas fa-cloud"></i> ${firebaseInitialized && isFirebasePrimary ? 'Online' : 'Offline'}</span>
                    <button class="mobile-nav-toggle" onclick="toggleMobileNav()"><i class="fas fa-bars"></i></button>
                </div>
            </header>

            <!-- Mobile Navigation -->
            <div class="mobile-nav" id="mobileNav">
                <button class="nav-btn ${currentView === 'pos' ? 'active' : ''}" onclick="navigate('pos')"><i class="fas fa-cash-register"></i> POS</button>
                <button class="nav-btn ${currentView === 'dashboard' ? 'active' : ''}" onclick="navigate('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
                <button class="nav-btn ${currentView === 'openservices' ? 'active' : ''}" onclick="navigate('openservices')"><i class="fas fa-clipboard-list"></i> Open Services</button>
                <button class="nav-btn ${currentView === 'staff' ? 'active' : ''}" onclick="navigate('staff')"><i class="fas fa-id-badge"></i> Staff</button>
                <button class="nav-btn ${currentView === 'customers' ? 'active' : ''}" onclick="navigate('customers')"><i class="fas fa-users"></i> Customers</button>
                <button class="nav-btn ${currentView === 'admin' ? 'active' : ''}" onclick="navigate('admin')"><i class="fas fa-crown"></i> Admin</button>
                <button class="nav-btn ${currentView === 'reports' ? 'active' : ''}" onclick="navigate('reports')"><i class="fas fa-chart-bar"></i> Reports</button>
                <button class="nav-btn ${currentView === 'commission' ? 'active' : ''}" onclick="navigate('commission')"><i class="fas fa-percent"></i> Commissions</button>
            </div>

            <!-- Main Content -->
            <div id="mainContent" class="mt-2"></div>

            <footer class="text-center text-gray-500 text-sm mt-8 pt-4 border-t border-gray-800">${appData.systemSettings.companyName} | v8.7 Stable | All Export & Print Functions Working | ${firebaseInitialized && isFirebasePrimary ? '🌐 Online Mode - Real-time Sync ON' : '📡 Offline Mode - Local Cache'}</footer>
        </div>
    `;

    renderApp();
    saveToLocal();

    console.log('%c8068 CAR SQUARE - Enterprise Management System v8.7 (Online Mode)', 'color: #00d4ff; font-size: 20px; font-weight: bold;');

    console.log('%c✅ All Export (Excel/PDF/CSV) & Print Functions Fully Operational', 'color: #00ff88;');
    console.log('%c📊 Auto-Commission on Service Complete | Real-time Sync Enabled', 'color: #ffaa00;');
    console.log(`%c🌐 Firebase: ${firebaseInitialized && isFirebasePrimary ? 'Connected (Online)' : 'Disconnected (Offline)'}`, 'color: #ffaa00;');
    console.log('%c⚡ Debounced sync prevents lag and duplicate requests', 'color: #00d4ff;');

    console.log('%c🔄 v8.7: Online Mode with offline support - data syncs when connection is restored', 'color: #00d4ff;');
    console.log('%c👥 Customer Database with full transaction history and credit tracking', 'color: #00d4ff;');
