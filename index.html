            "DIAMOND CARWASH_Medium": [720, 840, 960], "DIAMOND CARWASH_Large": [780, 910, 1040],
            "DIAMOND CARWASH_XL": [810, 945, 1080], "DIAMOND CARWASH_2XL": [840, 980, 1120],
            "DIAMOND CARWASH_3XL": [870, 1015, 1160], "ACID RAIN CARWASH_Small": [300, 350, 400],

            "ACID RAIN CARWASH_3XL": [480, 560, 640]
        };
    }

    const defaultCustomerPrices = {
        "BASIC CARWASH": { Small: 200, Medium: 230, Large: 250, XL: 300, "2XL": 350, "3XL": 400 },
        "ARMOR CARWASH": { Small: 300, Medium: 330, Large: 350, XL: 420, "2XL": 450, "3XL": 480 },

        "WAX ARMOR CARWASH": { Small: 650, Medium: 700, Large: 750, XL: 800, "2XL": 850, "3XL": 900 },
        "BUFFING CARWASH": { Small: 1000, Medium: 1050, Large: 1200, XL: 1300, "2XL": 1400 },
        "BACK TO 0 CARWASH": { Small: 680, Medium: 700, Large: 735, XL: 785, "2XL": 835, "3XL": 885 },
        "PLATINUM CARWASH": { Small: 1000, Medium: 1100, Large: 1200, XL: 1300, "2XL": 1400, "3XL": 1500 },
        "DIAMOND CARWASH": { Small: 2300, Medium: 2400, Large: 2600, XL: 2700, "2XL": 2800, "3XL": 2900 },
        "ACID RAIN CARWASH": { Small: 1000, Medium: 1200, Large: 1300, XL: 1400, "2XL": 1500, "3XL": 1600 },
        "INTERIOR DETAILING": { Standard: 4500 }, "EXTERIOR DETAILING": { Standard: 4500 },
        "TINT INSTALLATION": { Standard: 3800 }, "CERAMIC COATING": { Standard: 8000 },
        "GRAPHENE COATING": { Standard: 10000 }, "MOTOR WASH": { Small: 120, Large: 170 }
    };

    let appData = {
        services: Object.entries(defaultCustomerPrices).map(([name, prices], idx) => ({
            id: idx + 1, name: name, desc: getDescription(name), sizes: Object.keys(prices), prices: prices, category: getCategory(name), isActive: true
        })),
        categories: ['Basic Wash', 'Premium Wash', 'Wax Services', 'Buffing', 'Restoration', 'Platinum', 'Diamond', 'Acid Rain', 'Specialty'],
        customers: [],
        transactions: [],
        openServices: [],
        staff: [],
        expenses: [],
        credits: [],
        inventory: [
            { id: 1, name: "Car Shampoo", category: "Supplies", quantity: 50, unit: "Liters", reorderLevel: 20 },
            { id: 2, name: "Microfiber Towels", category: "Equipment", quantity: 200, unit: "Pieces", reorderLevel: 50 },
            { id: 3, name: "Tire Black", category: "Supplies", quantity: 30, unit: "Liters", reorderLevel: 10 },
            { id: 4, name: "Wax Polish", category: "Supplies", quantity: 15, unit: "Bottles", reorderLevel: 5 },
            { id: 5, name: "Interior Cleaner", category: "Supplies", quantity: 25, unit: "Liters", reorderLevel: 8 }
        ],
        systemSettings: {
            companyName: "8068 CAR SQUARE",
            tagline: "One Stop Shop",
            address: "8068 Carsquare, Dr Arcadio Santos Ave, Parañaque, 1720 Metro Manila",
            phone: "+63 947 702 2630 | +63 961 519 5229",
            facebook: "8068 Carsquare PH",
            taxRate: 0,
            loyaltyPointsPerPeso: 0.01,
            receiptFooter: "Drive Clean. Drive Premium.",
            commissionSplitRule: "50/50 Equal Split",
            currencySymbol: "₱",
            timezone: "Asia/Manila",
            businessHours: "Mon-Sat 8:00 AM - 7:00 PM",
            companyLogo: null,
            defaultPaymentMethods: ['Cash', 'GCash', 'Maya', 'Credit Card', 'Bank Transfer', 'Credit (Utang)'],
            receiptSize: '58mm',
            receiptHeader: 'OFFICIAL RECEIPT',
            showVAT: false
        },
        users: [
            { id: 1, username: "owner", password: "owner123", role: "Owner", name: "Owner", isActive: true },
            { id: 2, username: "manager", password: "manager123", role: "Manager", name: "Manager", isActive: true },
            { id: 3, username: "cashier", password: "cashier123", role: "Cashier", name: "Cashier", isActive: true },
            { id: 4, username: "staff", password: "staff123", role: "Staff", name: "Staff", isActive: true }
        ],
        currentUser: null,
        nextIds: { transaction: 100, customer: 50, expense: 20, service: 50, openService: 1, credit: 1 },
        commissionMatrix: initializeCommissionMatrix(),
        version: '8.5'
    };

    function getDescription(name) {
        const desc = {
            "BASIC CARWASH": "Carwash + Vacuum + Tire Black",
            "ARMOR CARWASH": "Carwash + Vacuum + Interior Dressing + Tire Black",
            "WAX CARWASH": "Carwash + Vacuum + Hydrophobic Wax + Tire Black",
            "WAX ARMOR CARWASH": "Carwash + Vacuum + Interior Dressing + Hydrophobic Wax + Tire Black",
            "BUFFING CARWASH": "Carwash + Vacuum + Interior Dressing + Hydrophobic Wax + Buffing Wax + Tire Black",
            "BACK TO 0 CARWASH": "Complete restoration + Paint correction",
            "PLATINUM CARWASH": "Carwash + Vacuum + Interior Dressing + Ceramic Wax + Tire Black",
            "DIAMOND CARWASH": "Carwash + Vacuum + Interior Dressing + Buffing Wax + Ceramic Wax + Tire Black",
            "ACID RAIN CARWASH": "Acid rain removal + Paint decontamination"
        };
        return desc[name] || "Premium automotive service";
    }

    function getCategory(name) {
        if(name.includes("BASIC")) return "Basic Wash";
        if(name.includes("ARMOR") && !name.includes("WAX")) return "Premium Wash";
        if(name.includes("WAX ARMOR")) return "Premium Wax";
        if(name.includes("WAX")) return "Wax Services";
        if(name.includes("BUFFING")) return "Buffing";
        if(name.includes("BACK")) return "Restoration";
        if(name.includes("PLATINUM")) return "Platinum";
        if(name.includes("DIAMOND")) return "Diamond";
        if(name.includes("ACID")) return "Acid Rain";
        return "Specialty";
    }

    // Load saved data - preserve all records
    const saved = localStorage.getItem("8068_enterprise_v8");
    if(saved) {
        try {
            const parsed = JSON.parse(saved);
            appData = { ...appData, ...parsed };
            if (!appData.commissionMatrix || Object.keys(appData.commissionMatrix).length === 0) {
                appData.commissionMatrix = initializeCommissionMatrix();
            }
            if (!appData.openServices) appData.openServices = [];
            if (!appData.inventory) appData.inventory = [];
            if (!appData.credits) appData.credits = [];
            if (!appData.users) appData.users = [
                { id: 1, username: "owner", password: "owner123", role: "Owner", name: "Owner", isActive: true },
                { id: 2, username: "manager", password: "manager123", role: "Manager", name: "Manager", isActive: true },
                { id: 3, username: "cashier", password: "cashier123", role: "Cashier", name: "Cashier", isActive: true },
                { id: 4, username: "staff", password: "staff123", role: "Staff", name: "Staff", isActive: true }
            ];
            if (!appData.currentUser) appData.currentUser = appData.users[0];
            if (!appData.systemSettings.defaultPaymentMethods) {
                appData.systemSettings.defaultPaymentMethods = ['Cash', 'GCash', 'Maya', 'Credit Card', 'Bank Transfer', 'Credit (Utang)'];
            }
            if (!appData.systemSettings.receiptSize) appData.systemSettings.receiptSize = '58mm';
            if (!appData.systemSettings.receiptHeader) appData.systemSettings.receiptHeader = 'OFFICIAL RECEIPT';
            if (appData.systemSettings.showVAT === undefined) appData.systemSettings.showVAT = false;
            if (!appData.version) appData.version = '8.5';
            appData.version = '8.5';
        } catch(e) {}
    }

    function saveToLocal() {
        localStorage.setItem("8068_enterprise_v8", JSON.stringify(appData));
        localStorage.setItem("8068_system_last_saved", new Date().toISOString());
    }

    function getCommissionAmount(serviceName, size, tierPercent) {
        const key = `${serviceName}_${size}`;
        const matrix = appData.commissionMatrix || {};
        const values = matrix[key];
        if (!values) return 0;
        if (tierPercent === 30) return values[0] || 0;
        if (tierPercent === 35) return values[1] || 0;
        if (tierPercent === 40) return values[2] || 0;
        return 0;
    }

    // ======================== STATE ========================
    let currentView = "dashboard";
    let currentAdminPanel = "transactions";
    let posCart = [];
    let selectedCustomer = null;
    let vehicleInfo = { plate: "", model: "", size: "Medium" };
    let discount = 0;
    let loyaltyPointsUsed = 0;
    let selectedPayment = "Cash";
    let cashTendered = 0;
    let cartRemarks = "";
    let showLogin = true;
    let reportPeriod = 'daily';
    let transactionFilter = 'daily';
    let currentPage = 1;
    let pageSize = 20;
    let searchQuery = '';
    let dateRangeStart = '';
    let dateRangeEnd = '';
    let mobileNavOpen = false;
    let chartInstances = {};

    function generateReceiptNo() { 
        const now = new Date();
        const count = appData.transactions.length + 1;
        return `INV-${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(count).padStart(4,'0')}`;
    }

    // ======================== REAL-TIME SYNC FUNCTIONS ========================
    function syncTransactionToReports(transaction) {

    // ======================== COMMISSION CALCULATION ========================
    function calculateStaffCommission(transaction) {
        if (!transaction.items) return {};
        const commissionMap = {};
        const staffMap = {};
        
        transaction.items.forEach(item => {
            if (item.assignedStaff && item.assignedStaff.length > 0) {
                item.assignedStaff.forEach(staff => {
                    const key = staff.id || staff.name;
                    if (!staffMap[key]) {
                        staffMap[key] = { ...staff, commission: 0, jobs: 0 };
                    }
                    const commAmount = getCommissionAmount(item.serviceName, item.variant, staff.commissionTier || 35);
                    const splitComm = item.assignedStaff.length === 2 ? commAmount / 2 : commAmount;
                    staffMap[key].commission += splitComm;
                    staffMap[key].jobs += 1;
                });
            }
        });

        Object.keys(staffMap).forEach(key => {
            const s = staffMap[key];
            commissionMap[key] = {
                name: s.name,
                commission: s.commission,
                jobs: s.jobs,
                tier: s.commissionTier || 35
            };
        });

        return commissionMap;
    }

    // ======================== RECALCULATE STAFF COMMISSIONS ========================
    function recalculateStaffCommissions() {
        appData.staff.forEach(s => {
            s.totalCommission = 0;
            s.jobsCompleted = 0;
            s.salesGenerated = 0;
            s.weeklyBreakdown = { Sunday: 0, Monday: 0, Tuesday: 0, Wednesday: 0, Thursday: 0, Friday: 0, Saturday: 0 };
            s.weekPart1Total = 0;
            s.weekPart2Total = 0;
            s.monthlyCommission = 0;
            s.dailyCommission = 0;
        });

        appData.transactions.forEach(t => {
            if (t.staffCommissions) {
                const txDate = new Date(t.date);
                const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][txDate.getDay()];
                Object.entries(t.staffCommissions).forEach(([staffId, data]) => {
                    const staff = appData.staff.find(s => s.id === parseInt(staffId) || s.name === data.name);
                    if (staff) {
                        const commission = data.commission || 0;
                        staff.totalCommission = (staff.totalCommission || 0) + commission;
                        staff.jobsCompleted = (staff.jobsCompleted || 0) + (data.jobs || 1);
                        staff.salesGenerated = (staff.salesGenerated || 0) + (t.total || 0);
                        if (staff.weeklyBreakdown) {
                            staff.weeklyBreakdown[dayName] = (staff.weeklyBreakdown[dayName] || 0) + commission;
                        }
                        staff.monthlyCommission = (staff.monthlyCommission || 0) + commission;
                        staff.dailyCommission = (staff.dailyCommission || 0) + commission;
                    }
                });
            }
        });

        appData.staff.forEach(s => {
            if (s.weeklyBreakdown) {
                s.weekPart1Total = (s.weeklyBreakdown.Sunday || 0) + (s.weeklyBreakdown.Monday || 0) + (s.weeklyBreakdown.Tuesday || 0);
                s.weekPart2Total = (s.weeklyBreakdown.Wednesday || 0) + (s.weeklyBreakdown.Thursday || 0) + (s.weeklyBreakdown.Friday || 0) + (s.weeklyBreakdown.Saturday || 0);
            }
        });

        saveToLocal();
    }

    // ======================== EXPORT FUNCTIONS ========================
    function getFilteredTransactions(period) {
        const now = new Date();
        let filtered = [];
        if (period === 'daily') {
            const todayStr = now.toISOString().slice(0,10);
            filtered = appData.transactions.filter(t => t.date && t.date.startsWith(todayStr));
        } else if (period === 'weekly') {
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            const weekStartStr = weekStart.toISOString().slice(0,10);
            filtered = appData.transactions.filter(t => t.date && t.date >= weekStartStr);
        } else if (period === 'monthly') {
            const month = now.getMonth();
            const year = now.getFullYear();
            filtered = appData.transactions.filter(t => {
                if (!t.date) return false;
                const d = new Date(t.date);
                return d.getMonth() === month && d.getFullYear() === year;
            });
        } else if (period === 'yearly') {
            const year = now.getFullYear();
            filtered = appData.transactions.filter(t => {
                if (!t.date) return false;
                return new Date(t.date).getFullYear() === year;
            });
        }
        return filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function generateExcel(data, columns, title, filename) {
        const wb = XLSX.utils.book_new();
        const wsData = [columns.map(c => c.header)];
        data.forEach(row => {
            wsData.push(columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
        });
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!cols'] = columns.map(() => ({ wch: 20 }));
        ws['!rows'] = [{ hpx: 30 }];
        XLSX.utils.book_append_sheet(wb, ws, title);
        XLSX.writeFile(wb, `${filename}_${new Date().toISOString().slice(0,10)}.xlsx`);
        return true;
    }

    function generateCSV(data, columns, filename) {
        let csv = columns.map(c => c.header).join(',') + '\n';
        data.forEach(row => {
            csv += columns.map(c => `"${row[c.key] !== undefined ? row[c.key] : ''}"`).join(',') + '\n';
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${filename}_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        return true;
    }

    function generatePDF(data, columns, title, filename, logo) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.getWidth();
        
        if (logo) {
            try {
                doc.addImage(logo, 'JPEG', pageWidth/2 - 20, 5, 40, 20);
            } catch(e) {}
        }
        
        doc.setFontSize(16);
        doc.text(title, pageWidth/2, 30, { align: 'center' });
        doc.setFontSize(10);
        doc.text(`Generated: ${new Date().toLocaleString()}`, pageWidth/2, 38, { align: 'center' });
        doc.text(`Company: ${appData.systemSettings.companyName}`, pageWidth/2, 44, { align: 'center' });
        
        const tableData = data.map(row => columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
        doc.autoTable({
            head: [columns.map(c => c.header)],
            body: tableData,
            startY: 50,
            styles: { fontSize: 8, cellPadding: 2 },
            headStyles: { fillColor: [0, 212, 255], textColor: [0,0,0], fontStyle: 'bold' },
            alternateRowStyles: { fillColor: [240, 240, 240] },
            didDrawPage: function(data) {
                doc.setFontSize(8);
                doc.text(`Page ${data.pageNumber}`, pageWidth - 20, doc.internal.pageSize.getHeight() - 10);
            }
        });
        doc.save(`${filename}_${new Date().toISOString().slice(0,10)}.pdf`);
        return true;
    }

            printReceipt(tx);

            alert('Transaction not found');

        if (tx) printReceipt(tx);
    };

    window.editField = (id, field) => {
        const tx = appData.transactions.find(t => t.id === id || t.receiptNo === id);
        if (!tx) return;
        const val = prompt(`Edit ${field}:`, tx[field] || '');
        if (val !== null) {
            tx[field] = val;
            if (field === 'paymentMethod' && val === 'Credit (Utang)') {
                tx.isCredit = true;
            }
            saveToLocal();
            recalculateStaffCommissions();
            renderApp();
        }
    };

    window.editTransaction = (id) => {
        const tx = appData.transactions.find(t => t.id === id || t.receiptNo === id);
        if (!tx) return;
        const fields = ['customer', 'vehicle', 'plate', 'paymentMethod'];
        let msg = 'Edit Transaction:\n';
        fields.forEach(f => {
            msg += `${f}: ${tx[f] || ''}\n`;
        });
        const choice = prompt(msg + '\nEnter field to edit (customer/vehicle/plate/paymentMethod):');
        if (choice && fields.includes(choice)) {
            const val = prompt(`Enter new ${choice}:`, tx[choice] || '');
            if (val !== null) {
                tx[choice] = val;
                if (choice === 'paymentMethod' && val === 'Credit (Utang)') {
                    tx.isCredit = true;
                }
                saveToLocal();
                recalculateStaffCommissions();
                renderApp();
            }
        }
    };

    window.deleteTransactionItem = (id) => {
        if (!hasRole(['Owner'])) {
            alert('Only Owner can delete transactions');
            return;
        }
        if (!confirm('Delete this transaction? This action cannot be undone.')) return;
        const idx = appData.transactions.findIndex(t => t.id === id || t.receiptNo === id);
        if (idx === -1) return;
        appData.transactions.splice(idx, 1);
        saveToLocal();
        recalculateStaffCommissions();
        renderApp();
        alert('✅ Transaction deleted');
    };

        const todaySales = todayTx.reduce((s,t) => s + (t.total || 0), 0);
        const todayCount = todayTx.length;
        const todayCustomers = new Set(todayTx.map(t => t.customer)).size;
        const todayExpenses = appData.expenses.filter(e => e.date === todayStr).reduce((s,e) => s + (e.amount || 0), 0);
        
        const weekStart = new Date(now);
        weekStart.setDate(now.getDate() - now.getDay());
        const weekStartStr = weekStart.toISOString().slice(0,10);
        const weekTx = appData.transactions.filter(t => t.date && t.date >= weekStartStr);
        const weekSales = weekTx.reduce((s,t) => s + (t.total || 0), 0);
        const weekCount = weekTx.length;
        const prevWeekStart = new Date(weekStart);
        prevWeekStart.setDate(prevWeekStart.getDate() - 7);
        const prevWeekTx = appData.transactions.filter(t => t.date && t.date >= prevWeekStart.toISOString().slice(0,10) && t.date < weekStartStr);
        const prevWeekSales = prevWeekTx.reduce((s,t) => s + (t.total || 0), 0);

        const service = appData.services.find(s => s.id === serviceId);
        if (!service) return;

            <div class="size-option bg-gray-800 p-3 rounded-lg cursor-pointer hover:bg-cyan-500 hover:text-black transition-all m-1 inline-block" data-size="${size}" data-price="${service.prices[size]}">

            </div>
        `).join('');
        let modalHtml = `<div id="sizeModal" class="modal"><div class="modal-content">
            <h3 class="text-xl font-bold mb-2">${service.name}</h3>
            <p class="text-sm text-gray-400 mb-2">${service.desc || ''}</p>
            <div id="sizeOptions" class="flex flex-wrap gap-2 mb-4 justify-center">${sizeHtml}</div>
            <div><label class="text-sm text-gray-400">Item Remarks:</label><input type="text" id="itemRemarkInput" class="w-full bg-gray-800 p-2 rounded mt-1 text-sm"></div>
            <div class="flex gap-3 mt-2"><button onclick="confirmAddToCart('${serviceId}')" class="btn-neon flex-1 p-2 rounded text-white">Add</button><button onclick="closeSizeModal()" class="bg-gray-700 flex-1 p-2 rounded">Cancel</button></div>

                this.dataset.selected = 'true';
            });

    window.confirmAddToCart = (serviceId) => {
        const selected = document.querySelector('.size-option[data-selected="true"]') || document.querySelector('.size-option');
        if (!selected) { alert('Please select a size'); return; }
        const service = appData.services.find(s => s.id === serviceId);
        const remark = document.getElementById('itemRemarkInput')?.value || '';
        posCart.push({
            serviceId: serviceId,
            serviceName: service.name,
            variant: selected.dataset.size,
            price: parseFloat(selected.dataset.price),
            quantity: 1,
            total: parseFloat(selected.dataset.price),
            remarks: remark,
            assignedStaff: []
        });
        closeSizeModal();
        showStaffAssignmentModal(posCart.length - 1);
        renderApp();
    };

    window.closeSizeModal = () => document.getElementById('sizeModal')?.remove();

    function showStaffAssignmentModal(cartIndex) {
        const item = posCart[cartIndex];
        if (!item) return;
        const activeStaff = appData.staff.filter(s => s.isActive !== false);
        let staffHtml = activeStaff.map(s => `
            <label class="flex items-center gap-2 p-2 bg-gray-800 rounded cursor-pointer hover:bg-gray-700 text-sm">
                <input type="checkbox" value="${s.id}" class="staff-checkbox" data-name="${s.name}" data-tier="${s.commissionTier || 35}">
                <span>${s.name}</span> <span class="text-xs text-gray-400">(${s.position})</span>
                <span class="commission-badge ml-auto">${s.commissionTier || 35}%</span>
            </label>
        `).join('');

        let modalHtml = `<div id="staffModal" class="modal"><div class="modal-content">
            <h3 class="text-xl font-bold mb-2">Assign Staff: ${item.serviceName}</h3>
            <p class="text-sm text-yellow-400 mb-2">Commission Split: ${appData.systemSettings.commissionSplitRule}</p>
            <div class="space-y-1 max-h-40 overflow-y-auto">${staffHtml || '<div class="text-gray-400">No staff available</div>'}</div>
            <div class="flex gap-3 mt-4"><button onclick="confirmStaffAssignment(${cartIndex})" class="btn-neon flex-1 p-2 rounded text-white">Confirm</button><button onclick="closeStaffModal()" class="bg-gray-700 flex-1 p-2 rounded">Skip</button></div>
        </div></div>`;

    window.confirmStaffAssignment = (cartIndex) => {
        const selected = [];
        document.querySelectorAll('.staff-checkbox:checked').forEach(cb => {
            const staff = appData.staff.find(s => s.id === parseInt(cb.value));
            if (staff) {
                selected.push({ ...staff });
            }
        });
        if (selected.length > 0) {
            posCart[cartIndex].assignedStaff = selected;
        }
        closeStaffModal();
        renderApp();
    };

    window.closeStaffModal = () => document.getElementById('staffModal')?.remove();
    window.removeCartItem = (idx) => { posCart.splice(idx,1); renderApp(); };
    window.updateCartQuantity = (idx, qty) => {
        if (qty > 0) {
            posCart[idx].quantity = parseInt(qty);
            posCart[idx].total = posCart[idx].price * parseInt(qty);
            renderApp();
        }
    };
    function calcSubtotal() { return posCart.reduce((s, i) => s + i.total, 0); }
    function calcTotal() { let total = calcSubtotal() - discount - loyaltyPointsUsed; return total > 0 ? total : 0; }

    window.selectCustomerPopup = () => {
        const name = prompt('Customer name:');
        if (!name) return;
        let existing = appData.customers.find(c => c.name === name);
        if (existing) {
            selectedCustomer = existing;
        } else {
            selectedCustomer = { id: Date.now(), name, mobile: '', vehicleInfo: '', plate: '', loyaltyPoints: 0 };
            appData.customers.push(selectedCustomer);
            saveToLocal();
        }
        renderApp();
    };

    window.saveAsOpenService = () => {
        if (posCart.length === 0) { alert('Cart is empty!'); return; }
        const customer = selectedCustomer ? selectedCustomer.name : 'Walk-in Customer';
        const vehicle = vehicleInfo.model || 'N/A';
        const plate = vehicleInfo.plate || 'N/A';
        const total = calcTotal();
        const allStaff = posCart.flatMap(i => i.assignedStaff || []).filter((v,i,a) => a.indexOf(v) === i);
        
        const openService = {
            id: 'OS-' + new Date().getFullYear() + '-' + String(appData.nextIds.openService++).padStart(4,'0'),
            customer,
            vehicle,
            plate,
            items: posCart.map(i => ({ ...i })),
            total,
            staff: allStaff,
            remarks: cartRemarks,
            status: 'pending',
            createdAt: new Date().toISOString()
        };
        appData.openServices.push(openService);
        saveToLocal();
        alert('✅ Service saved as Open Service!');
        posCart = [];
        selectedCustomer = null;
        vehicleInfo = { plate: '', model: '', size: 'Medium' };
        discount = 0;
        loyaltyPointsUsed = 0;
        renderApp();
    };

    window.completeSaleWrapper = async () => {
        selectedPayment = document.getElementById('paymentMethod')?.value || 'Cash';
        cashTendered = parseFloat(document.getElementById('cashTenderedInput')?.value || 0);
        discount = parseFloat(document.getElementById('discountInput')?.value || 0);
        const total = calcTotal();
        if (selectedPayment === 'Cash' && cashTendered < total) { alert('Insufficient cash!'); return; }
        if (posCart.length === 0) { alert('Cart is empty!'); return; }

        const isCredit = selectedPayment === 'Credit (Utang)';
        if (isCredit && !selectedCustomer) {
            alert('Please select a customer for credit transaction!');
            return;
        }

        const staffCommMap = {};
        posCart.forEach(item => {
            if (item.assignedStaff) {
                item.assignedStaff.forEach(staff => {
                    const comm = getCommissionAmount(item.serviceName, item.variant, staff.commissionTier || 35);
                    const splitComm = item.assignedStaff.length === 2 ? comm / 2 : comm;
                    if (!staffCommMap[staff.id]) {
                        staffCommMap[staff.id] = { name: staff.name, commission: 0, jobs: 0, tier: staff.commissionTier || 35 };
                    }
                    staffCommMap[staff.id].commission += splitComm;
                    staffCommMap[staff.id].jobs += 1;
                });
            }
        });

        const transaction = {
            id: generateReceiptNo(),
            date: new Date().toISOString(),
            customer: selectedCustomer ? selectedCustomer.name : 'Walk-in Customer',
            customerId: selectedCustomer?.id || null,
            vehicle: vehicleInfo.model || 'N/A',
            plate: vehicleInfo.plate || 'N/A',
            items: posCart.map(i => ({ ...i })),
            staffCommissions: staffCommMap,
            subtotal: calcSubtotal(),
            discount: discount,
            loyaltyUsed: loyaltyPointsUsed,
            total: total,
            paymentMethod: selectedPayment,
            isCredit: isCredit,
            cashTendered: selectedPayment === 'Cash' ? cashTendered : total,
            change: selectedPayment === 'Cash' ? (cashTendered - total) : 0,
            status: 'completed',
            remarks: cartRemarks || ''
        };

        appData.transactions.unshift(transaction);
        
        Object.entries(staffCommMap).forEach(([staffId, data]) => {
            const staff = appData.staff.find(s => s.id === parseInt(staffId));
            if (staff) {
                staff.totalCommission = (staff.totalCommission || 0) + data.commission;
                staff.jobsCompleted = (staff.jobsCompleted || 0) + data.jobs;
                staff.salesGenerated = (staff.salesGenerated || 0) + total;
            }
        });

        if (isCredit && selectedCustomer) {
            appData.credits.push({
                id: 'CR-' + new Date().getFullYear() + '-' + String(appData.nextIds.credit++).padStart(4,'0'),
                customerName: selectedCustomer.name,
                contact: selectedCustomer.mobile || '',
                transactionId: transaction.id,
                amount: total,
                paid: 0,
                balance: total,
                date: new Date().toISOString().slice(0,10),
                status: 'pending'
            });
        }

        saveToLocal();
        recalculateStaffCommissions();
        alert(`✅ Sale Complete!\nTotal: ₱${total.toFixed(2)}`);
        printReceipt(transaction);
        syncTransactionToReports(transaction);
        
        posCart = [];
        selectedCustomer = null;
        vehicleInfo = { plate: '', model: '', size: 'Medium' };
        discount = 0;
        loyaltyPointsUsed = 0;
        renderApp();
    };

    // ======================== OPEN SERVICES ========================
    function renderOpenServices() {
        if(showLogin) return renderLogin();
        
        const pending = appData.openServices.filter(s => s.status === 'pending');
        const inProgress = appData.openServices.filter(s => s.status === 'in-progress');
        const completed = appData.openServices.filter(s => s.status === 'completed');

        const renderCard = (s) => `
            <div class="bg-gray-800 rounded-lg p-3 border border-gray-700 mb-2">
                <div class="flex justify-between">
                    <div><span class="font-bold">${s.customer}</span> <span class="text-xs text-gray-400">${s.vehicle} | ${s.plate}</span></div>
                    <div><span class="status-badge ${s.status === 'pending' ? 'status-pending' : s.status === 'in-progress' ? 'status-in-progress' : 'status-completed'}">${s.status.toUpperCase()}</span></div>
                </div>
                <div class="text-sm text-cyan-400">₱${s.total.toFixed(2)}</div>
                <div class="text-xs text-gray-400">${(s.items || []).map(i => i.serviceName).join(', ')}</div>
                <div class="flex gap-1 mt-2 flex-wrap">
                    ${s.status === 'pending' ? `<button onclick="updateOpenService('${s.id}', 'in-progress')" class="action-btn bg-orange-600 text-white">Start</button>` : ''}
                    ${s.status === 'in-progress' ? `<button onclick="updateOpenService('${s.id}', 'completed')" class="action-btn bg-green-600 text-white">Complete</button>` : ''}
                    ${s.status === 'completed' ? `<button onclick="completeOpenServicePayment('${s.id}')" class="action-btn bg-blue-600 text-white">Pay</button>` : ''}
                    <button onclick="deleteOpenService('${s.id}')" class="action-btn bg-red-600 text-white">Delete</button>
                </div>

        return `<div class="card-premium p-4">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-clipboard-list"></i> Open Services</h2>
            <div class="grid md:grid-cols-3 gap-4">
                <div><h4 class="text-yellow-400 font-bold">Pending (${pending.length})</h4>${pending.map(renderCard).join('') || '<div class="text-gray-400 text-sm">None</div>'}</div>
                <div><h4 class="text-cyan-400 font-bold">In Progress (${inProgress.length})</h4>${inProgress.map(renderCard).join('') || '<div class="text-gray-400 text-sm">None</div>'}</div>
                <div><h4 class="text-green-400 font-bold">Completed (${completed.length})</h4>${completed.map(renderCard).join('') || '<div class="text-gray-400 text-sm">None</div>'}</div>
            </div>
        </div>`;
    }

    window.updateOpenService = (id, status) => {
        const service = appData.openServices.find(s => s.id === id);
        if (!service) return;
        service.status = status;
        if (status === 'completed') {
            service.completedAt = new Date().toISOString();
            const staffCommMap = {};
            (service.items || []).forEach(item => {
                if (item.assignedStaff) {
                    item.assignedStaff.forEach(staff => {
                        const comm = getCommissionAmount(item.serviceName, item.variant, staff.commissionTier || 35);
                        const splitComm = item.assignedStaff.length === 2 ? comm / 2 : comm;
                        if (!staffCommMap[staff.id]) {
                            staffCommMap[staff.id] = { name: staff.name, commission: 0, jobs: 0, tier: staff.commissionTier || 35 };
                        }
                        staffCommMap[staff.id].commission += splitComm;
                        staffCommMap[staff.id].jobs += 1;
                    });
                }
            });

            const tx = {
                id: generateReceiptNo(),
                date: new Date().toISOString(),
                customer: service.customer,
                vehicle: service.vehicle,
                plate: service.plate,
                items: service.items || [],
                staffCommissions: staffCommMap,
                subtotal: service.total,
                discount: 0,
                loyaltyUsed: 0,
                total: service.total,
                paymentMethod: 'Open Service',
                isCredit: false,
                cashTendered: service.total,
                change: 0,
                status: 'completed',
                remarks: (service.remarks || '') + ' (Completed Service)',
                isOpenService: true,
                openServiceId: service.id
            };

            appData.transactions.unshift(tx);
            
            Object.entries(staffCommMap).forEach(([staffId, data]) => {
                const staff = appData.staff.find(s => s.id === parseInt(staffId));
                if (staff) {
                    staff.totalCommission = (staff.totalCommission || 0) + data.commission;
                    staff.jobsCompleted = (staff.jobsCompleted || 0) + data.jobs;
                    staff.salesGenerated = (staff.salesGenerated || 0) + service.total;
                }
            });

            saveToLocal();
            recalculateStaffCommissions();
            syncTransactionToReports(tx);
        }
        saveToLocal();
        renderApp();
        if (status === 'completed') {
            alert('✅ Service completed! Commission generated automatically.');
        }
    };

    window.completeOpenServicePayment = (id) => {
        const service = appData.openServices.find(s => s.id === id);
        if (!service) return;
        const paymentMethods = appData.systemSettings.defaultPaymentMethods || ['Cash', 'GCash', 'Maya', 'Credit Card', 'Bank Transfer', 'Credit (Utang)'];
        const method = prompt(`Payment method (${paymentMethods.join(', ')}):`, 'Cash');
        if (!method) return;
        const total = service.total;
        let cashTendered = total;
        if (method === 'Cash') {
            const tendered = parseFloat(prompt('Cash tendered:', total));
            if (isNaN(tendered) || tendered < total) { alert('Insufficient cash!'); return; }
            cashTendered = tendered;
        }

        const tx = {
            id: generateReceiptNo(),
            date: new Date().toISOString(),
            customer: service.customer,
            vehicle: service.vehicle,
            plate: service.plate,
            items: service.items || [],
            staffCommissions: service.staffCommissions || {},
            subtotal: total,
            discount: 0,
            loyaltyUsed: 0,
            total: total,
            paymentMethod: method,
            isCredit: method === 'Credit (Utang)',
            cashTendered: cashTendered,
            change: method === 'Cash' ? (cashTendered - total) : 0,
            status: 'paid',
            remarks: (service.remarks || '') + ' (Paid)',
            isOpenService: true,
            openServiceId: service.id
        };

        appData.transactions.unshift(tx);
        service.status = 'paid';
        service.paidAt = new Date().toISOString();
        saveToLocal();
        recalculateStaffCommissions();
        syncTransactionToReports(tx);
        alert('✅ Payment completed! Receipt printed.');
        printReceipt(tx);
        appData.openServices = appData.openServices.filter(s => s.id !== id);
        renderApp();
    };

    window.deleteOpenService = (id) => {
        if (confirm('Delete this open service?')) {
            appData.openServices = appData.openServices.filter(s => s.id !== id);
            saveToLocal();
            renderApp();
        }
    };

    // ======================== WEEKLY COMMISSION REPORT ========================
    function renderWeeklyCommissionReport() {
        if(showLogin) return renderLogin();
        recalculateStaffCommissions();

        const now = new Date();
        const currentWeekStart = new Date(now);
        currentWeekStart.setDate(now.getDate() - now.getDay());
        const weekStartStr = currentWeekStart.toISOString().slice(0,10);
        const weekEnd = new Date(currentWeekStart);
        weekEnd.setDate(currentWeekStart.getDate() + 6);
        const weekEndStr = weekEnd.toISOString().slice(0,10);

        const weekDates = [];
        for (let d = 0; d < 7; d++) {
            const dt = new Date(currentWeekStart);
            dt.setDate(currentWeekStart.getDate() + d);
            weekDates.push({ date: dt, dateStr: dt.toISOString().slice(0,10), dayName: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dt.getDay()] });
        }

        const weekTx = appData.transactions.filter(t => t.date && t.date >= weekStartStr && t.date <= weekEndStr);
        
        const weekStaffMap = {};
        appData.staff.forEach(s => {
            weekStaffMap[s.id] = {
                name: s.name,
                position: s.position || 'Staff',
                tier: s.commissionTier || 35,
                jobs: 0,
                sales: 0,
                sunday: 0, monday: 0, tuesday: 0, wednesday: 0, thursday: 0, friday: 0, saturday: 0,
                total: 0
            };
        });

        weekTx.forEach(t => {
            if (t.staffCommissions) {
                const txDate = new Date(t.date);
                const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][txDate.getDay()].toLowerCase();
                Object.entries(t.staffCommissions).forEach(([staffId, data]) => {
                    const staffIdNum = parseInt(staffId);
                    if (weekStaffMap[staffIdNum]) {
                        const comm = data.commission || 0;
                        weekStaffMap[staffIdNum].jobs += (data.jobs || 1);
                        weekStaffMap[staffIdNum].sales += (t.total || 0);
                        weekStaffMap[staffIdNum].total += comm;
                        weekStaffMap[staffIdNum][dayName] = (weekStaffMap[staffIdNum][dayName] || 0) + comm;
                    }
                });
            }
        });

        const dayHeaders = weekDates.map(wd => 
            `<th class="text-center py-1 text-cyan-300 text-xs">${wd.dayName.slice(0,3)}<br><span class="text-gray-500 text-[10px]">${wd.dateStr}</span></th>`
        ).join('');

        let tableRows = '';
        let grandTotal = 0;
        let grandJobs = 0;
        let grandSales = 0;
        let dailyTotals = { sunday: 0, monday: 0, tuesday: 0, wednesday: 0, thursday: 0, friday: 0, saturday: 0 };
        
        Object.values(weekStaffMap).forEach(s => {
            grandTotal += s.total;
            grandJobs += s.jobs;
            grandSales += s.sales;
            const part1 = (s.sunday || 0) + (s.monday || 0) + (s.tuesday || 0);
            const part2 = (s.wednesday || 0) + (s.thursday || 0) + (s.friday || 0) + (s.saturday || 0);
            Object.keys(dailyTotals).forEach(day => {
                dailyTotals[day] += s[day] || 0;
            });
            tableRows += `<tr class="border-b border-gray-700 hover:bg-gray-800 transition">
                <td class="py-1 font-semibold text-sm">${s.name}</td>
                <td class="py-1 text-sm">${s.position}</td>
                <td class="py-1 text-center"><span class="commission-badge">${s.tier}%</span></td>
                <td class="py-1 text-center">${s.jobs}</td>
                <td class="py-1 text-right text-sm">₱${s.sales.toFixed(2)}</td>
                <td class="py-1 text-center text-sm text-cyan-300">₱${(s.sunday||0).toFixed(2)}</td>
                <td class="py-1 text-center text-sm text-cyan-300">₱${(s.monday||0).toFixed(2)}</td>
                <td class="py-1 text-center text-sm text-cyan-300">₱${(s.tuesday||0).toFixed(2)}</td>
                <td class="py-1 text-center text-sm text-cyan-300">₱${(s.wednesday||0).toFixed(2)}</td>
                <td class="py-1 text-center text-sm text-cyan-300">₱${(s.thursday||0).toFixed(2)}</td>
                <td class="py-1 text-center text-sm text-cyan-300">₱${(s.friday||0).toFixed(2)}</td>
                <td class="py-1 text-center text-sm text-cyan-300">₱${(s.saturday||0).toFixed(2)}</td>
                <td class="py-1 text-center text-yellow-400 font-bold text-sm">₱${part1.toFixed(2)}</td>
                <td class="py-1 text-center text-yellow-400 font-bold text-sm">₱${part2.toFixed(2)}</td>
                <td class="py-1 text-center text-green-400 font-bold text-sm">₱${s.total.toFixed(2)}</td>
            </tr>`;
        });

        const dailyTotalRow = `<tr class="border-t-2 border-cyan-400 bg-gray-800 font-bold">
            <td colspan="5" class="py-1 text-right">Daily Totals:</td>
            <td class="py-1 text-center text-cyan-300">₱${dailyTotals.sunday.toFixed(2)}</td>
            <td class="py-1 text-center text-cyan-300">₱${dailyTotals.monday.toFixed(2)}</td>
            <td class="py-1 text-center text-cyan-300">₱${dailyTotals.tuesday.toFixed(2)}</td>
            <td class="py-1 text-center text-cyan-300">₱${dailyTotals.wednesday.toFixed(2)}</td>
            <td class="py-1 text-center text-cyan-300">₱${dailyTotals.thursday.toFixed(2)}</td>
            <td class="py-1 text-center text-cyan-300">₱${dailyTotals.friday.toFixed(2)}</td>
            <td class="py-1 text-center text-cyan-300">₱${dailyTotals.saturday.toFixed(2)}</td>
            <td colspan="3"></td>
        </tr>`;

        return `<div class="card-premium p-4">
            <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                <div>
                    <h3 class="text-xl font-bold"><i class="fas fa-calendar-week"></i> Weekly Commission Report</h3>
                    <p class="text-sm text-gray-400">${weekStartStr} to ${weekEndStr}</p>

    window.uploadLogo = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    appData.systemSettings.companyLogo = event.target.result;
                    saveToLocal();
                    renderApp();
                    alert('Logo uploaded successfully!');
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    };

    window.removeLogo = () => {
        if(confirm('Remove company logo?')) {
            appData.systemSettings.companyLogo = null;
            saveToLocal();
            renderApp();
            alert('Logo removed.');
        }
    };

    window.backupData = () => {
        const dataStr = JSON.stringify(appData);
        localStorage.setItem("system_backup_8068", dataStr);
        const blob = new Blob([dataStr], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `8068_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        alert("Backup created!");
    };

    window.restoreData = () => {
        const backup = localStorage.getItem("system_backup_8068");
        if(backup) {
            try {
                Object.assign(appData, JSON.parse(backup));
                saveToLocal();
                alert("Restored!");
                renderApp();
            } catch(e) {
                alert("Backup corrupted!");
            }
        } else {
            alert("No backup found!");
        }
    };

    };

    window.confirmAddInventory = () => {
        const name = document.getElementById('invName')?.value?.trim();
        if (!name) { alert('Name required!'); return; }
        appData.inventory.push({
            id: Date.now(),
            name,
            quantity: parseInt(document.getElementById('invQty')?.value) || 0,
            unit: document.getElementById('invUnit')?.value || 'Pieces',
            reorderLevel: parseInt(document.getElementById('invReorder')?.value) || 10,
            category: 'General'
        });
        saveToLocal();
        closeAdminModal();
        alert('✅ Inventory item added!');
        renderApp();
    };

    window.deleteInventoryItem = (id) => {
        if (confirm('Delete this item?')) {
            appData.inventory = appData.inventory.filter(i => i.id !== id);
            saveToLocal();
            renderApp();
        }
    };

    // ======================== MAIN RENDER ========================
    function renderApp() {
        const root = document.getElementById('root');
        if (!root) return;

        if (showLogin) {
            root.innerHTML = renderLogin();
            return;
        }

        let content = '';
        if (currentView === 'dashboard') content = renderDashboard();
        else if (currentView === 'pos') content = renderPOS();
        else if (currentView === 'openservices') content = renderOpenServices();
        else if (currentView === 'admin') content = renderAdminDashboard();
        else if (currentView === 'reports') content = renderReports();
        else content = renderDashboard();

        const isActive = (view) => currentView === view ? 'active' : '';

        root.innerHTML = `
            <div class="max-w-screen-2xl mx-auto px-4 py-3">
                <!-- Header -->
                <header class="main-header">
                    <div class="logo-container">
                        <div class="logo-icon">
                            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="5" y="5" width="90" height="90" rx="15" stroke="#00d4ff" stroke-width="3" fill="#0a0a0a"/>
                                <circle cx="50" cy="50" r="35" stroke="#00d4ff" stroke-width="2" fill="none"/>
                                <text x="50" y="58" font-family="Inter, sans-serif" font-size="38" font-weight="700" fill="#00d4ff" text-anchor="middle" dominant-baseline="central">CS</text>
                                <circle cx="50" cy="50" r="42" stroke="rgba(0,212,255,0.2)" stroke-width="1" stroke-dasharray="4 4" fill="none"/>
                            </svg>
                        </div>
                        <div class="brand-text">
                            <span class="company-title">8068 CAR SQUARE</span>
                            <span class="company-subtitle">One Stop Shop <span class="company-version">| v8.5</span></span>
                        </div>
                    </div>
                    <div class="header-nav">
                        <button class="nav-btn ${isActive('dashboard')}" onclick="navigate('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
                        <button class="nav-btn ${isActive('pos')}" onclick="navigate('pos')"><i class="fas fa-cash-register"></i> POS</button>
                        <button class="nav-btn ${isActive('openservices')}" onclick="navigate('openservices')"><i class="fas fa-clipboard-list"></i> Open</button>
                        <button class="nav-btn ${isActive('admin')}" onclick="navigate('admin')"><i class="fas fa-crown"></i> Admin</button>
                        <button class="nav-btn ${isActive('reports')}" onclick="navigate('reports')"><i class="fas fa-chart-bar"></i> Reports</button>
                    </div>
                    <div class="header-user">
                        <span class="user-name"><i class="fas fa-user-circle"></i> ${appData.currentUser?.name || 'User'}</span>
                        <span class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></span>
                        <button class="mobile-nav-toggle" onclick="toggleMobileNav()"><i class="fas fa-bars"></i></button>
                    </div>
                </header>
                <div class="mobile-nav" id="mobileNav">
                    <button class="nav-btn ${isActive('dashboard')}" onclick="navigate('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
                    <button class="nav-btn ${isActive('pos')}" onclick="navigate('pos')"><i class="fas fa-cash-register"></i> POS</button>
                    <button class="nav-btn ${isActive('openservices')}" onclick="navigate('openservices')"><i class="fas fa-clipboard-list"></i> Open Services</button>
                    <button class="nav-btn ${isActive('admin')}" onclick="navigate('admin')"><i class="fas fa-crown"></i> Admin</button>
                    <button class="nav-btn ${isActive('reports')}" onclick="navigate('reports')"><i class="fas fa-chart-bar"></i> Reports</button>
                </div>
                <div id="mainContent" class="mt-2">${content}</div>
                <footer class="text-center text-gray-500 text-xs mt-8 pt-4 border-t border-gray-800">
                    8068 Carsquare POS System v8.5 | Real-Time Sync | Auto-Commission
                </footer>
            </div>
        `;

        updateClock();
    }

    window.navigate = (view) => { currentView = view; mobileNavOpen = false; renderApp(); };
    window.toggleMobileNav = () => {
        const nav = document.getElementById('mobileNav');
        if (nav) nav.classList.toggle('open');
    };

    function updateClock() {
        const now = new Date();
        const clockEl = document.getElementById('liveClock');
        if (clockEl) clockEl.textContent = now.toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    }
    setInterval(updateClock, 1000);

    // ======================== INIT ========================
    // Migration to v8.5 - preserve all data
    if (!appData.version || appData.version !== '8.5') {
        appData.transactions.forEach(t => {
            if (!t.id && t.receiptNo) t.id = t.receiptNo;
            if (!t.receiptNo && t.id) t.receiptNo = t.id;
            if (!t.date) t.date = new Date().toISOString();
            if (!t.items) t.items = [];
            if (!t.staffCommissions) t.staffCommissions = {};
        });
        appData.version = '8.5';
        saveToLocal();
        console.log('✅ Migrated to v8.5 with all data preserved');
    }

    renderApp();
    saveToLocal();

    console.log('%c8068 CAR SQUARE - POS System v8.5', 'color: #00d4ff; font-size: 20px; font-weight: bold;');
    console.log('%c📊 Real-Time Sync | Auto-Commission | Full Transaction Management', 'color: #00ff88;');
    console.log(`%cRecords: ${appData.transactions.length} TX | ${appData.customers.length} Customers | ${appData.staff.length} Staff`, 'color: #ffaa00;');
</script>
</body>
</html>
